<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>셀프분석 - 5월 1주차 마침내 모의고사</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
        // Tailwind CDN 프로덕션 경고 완전 차단 (모든 콘솔 메서드)
        (function() {
            const suppress = (method) => {
                const original = console[method];
                console[method] = function(...args) {
                    const message = args[0] ? String(args[0]) : '';
                    if (message.includes('cdn.tailwindcss.com') || message.includes('Tailwind CSS')) {
                        return;
                    }
                    original.apply(console, args);
                };
            };
            
            suppress('log');
            suppress('warn');
            suppress('error');
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {}
            }
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://developers.kakao.com/sdk/js/kakao.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8F9FA; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .passage-card { transition: all 0.3s ease; }
        .passage-card:hover { transform: translateY(-2px); }
        .btn-kakao { background-color: #FEE500; color: #3C1E1E; }
        .btn-kakao:hover { background-color: #FDD800; }
        .answer-circle {
            width: 50px;
            height: 50px;
            border: 0 !important;
            border-width: 0 !important;
            border-style: none !important;
            border-color: transparent !important;
            border-radius: 50%;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
            color: #333;
            background: transparent !important;
            padding: 0 !important;
            margin: 0 !important;
            outline: none !important;
            box-shadow: none !important;
            appearance: none !important;
            -webkit-appearance: none !important;
            -moz-appearance: none !important;
        }
        .answer-circle:hover {
            background: #f0f0f0 !important;
            transform: scale(1.1);
            box-shadow: none !important;
            border: 0 !important;
        }
        .answer-circle:focus {
            outline: none !important;
            box-shadow: none !important;
            border: 0 !important;
        }
        .answer-circle.selected {
            background: #667eea !important;
            color: white;
            border: 0 !important;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2) !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, strokeWidth, display: 'inline-block' }}></i>;
        };

        const CONFIG = {
            hwId: "april_week3_2024",
            maxAttempts: 3,
            waitMinutes: 10,
            gasUrl: "https://script.google.com/macros/s/AKfycbw05gNe7MRMnFfo10otZ1BU-IXwKmLQGLTYQznrynRCfYzh7YMw7JYpyQjZUe8IbQFjHw/exec",
            kakaoAppKey: "844ef57e5edd5580a2290d70387bea79"
        };

        // 카카오 SDK 초기화
        if (window.Kakao && !window.Kakao.isInitialized()) {
            window.Kakao.init(CONFIG.kakaoAppKey);
        }

        const examConfig = {
            examName: "5월 1주차 마침내 모의고사",
            announcement: "■ 중요 안내사항\n\n【도전 횟수 및 시간 제한】\n• 최대 도전 횟수: 3회\n• 각 도전 간 대기 시간: 10분\n  (1회차 완료 후 10분 경과 → 2회차 응시 가능)\n  (2회차 완료 후 10분 경과 → 3회차 응시 가능)\n\n【중요】1회차 오답 시 영구 차단\n• 1회차 도전에서 오답이 발생하면 즉시 영구 차단됨\n• 재응시 및 해설지 열람이 불가능하므로 신중하게 응시하세요\n• 반드시 시험지를 정독한 후 자신있는 답만 입력하기\n\n■ 시험 전 마인드 콘트롤\n\n1. 시간 배분 (80분 기준)\n- 공통과목(1~34): 50분\n- 선택과목(35~45): 20분\n- 최종 검토: 10분\n\n2. 풀이 전략\n- 정보확인 문제 먼저 풀기\n- 어려운 문제는 나중에 풀기\n- 확실한 것부터 표시하기\n\n■ 채점 후 분석 방법\n\n1. 문제 분류\n◯ 확실: 확실히 맞을 것 같은 문제\n△ 애매: 애매하거나 헷갈린 문제\n✕ 못함: 모르거나 못 푼 문제\n\n2. 오답 분석\n- 틀린 문제의 정답 근거 찾기\n- 내가 놓친 부분 확인\n- 문제 패턴 파악\n\n3. 최종 반성\n- 시간 배분 평가\n- 약점 분석\n- 다음 시험 계획 세우기",
            common: {"1":"2", "2":"1", "3":"4", "4":"2", "5":"3", "6":"4", "7":"3", "8":"1", "9":"4", "10":"1", "11":"5", "12":"3", "13":"1", "14":"2", "15":"5", "16":"4", "17":"5", "18":"5", "19":"3", "20":"5", "21":"3", "22":"1", "23":"1", "24":"3", "25":"2", "26":"2", "27":"1", "28":"4", "29":"5", "30":"4", "31":"4", "32":"2", "33":"3", "34":"5"},
            subjects: {
                "화법과작문": {"35":"2", "36":"5", "37":"4", "38":"3", "39":"5", "40":"4", "41":"5", "42":"1", "43":"1", "44":"2", "45":"5"},
                "언어와매체": {"35":"5", "36":"3", "37":"4", "38":"5", "39":"1", "40":"3", "41":"2", "42":"3", "43":"4", "44":"5", "45":"3"}
            }
        };

        function StudentApp() {
            const [step, setStep] = useState(1);
            const [studentName, setStudentName] = useState('');
            const [academyName, setAcademyName] = useState('');
            const [preNotes, setPreNotes] = useState('');
            const [selectedSubject, setSelectedSubject] = useState('화법과작문');
            const [postNotes, setPostNotes] = useState('');
            const [permLocked, setPermLocked] = useState(() => localStorage.getItem(`permLocked_${CONFIG.hwId}`) === 'true');
            const [attemptCount, setAttemptCount] = useState(0);
            const [coolTimeRemaining, setCoolTimeRemaining] = useState(0);
            
            const [questionData, setQuestionData] = useState(() => {
                const data = {};
                for (let i = 1; i <= 45; i++) {
                    data[i] = { qNum: i, myAnswer: '', difficulty: '' };
                }
                return data;
            });

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [step]);

            useEffect(() => {
                updateAttemptInfo();
            }, []);

            useEffect(() => {
                if (step === 2 && coolTimeRemaining > 0) {
                    const timer = setInterval(() => {
                        setCoolTimeRemaining(prev => {
                            if (prev <= 1) {
                                clearInterval(timer);
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                    return () => clearInterval(timer);
                }
            }, [step, coolTimeRemaining]);

            const updateQuestion = (qNum, field, value) => {
                setQuestionData(prev => ({ ...prev, [qNum]: { ...prev[qNum], [field]: value } }));
            };

            const updateAttemptInfo = () => {
                const history = JSON.parse(localStorage.getItem(`attemptHistory_${CONFIG.hwId}`) || '[]');
                const remaining = CONFIG.maxAttempts - history.length;
                setAttemptCount(remaining);

                if (history.length > 0) {
                    const lastTime = history[history.length - 1].timestamp;
                    const elapsed = Math.floor((Date.now() - lastTime) / 60000);
                    const waitRemaining = Math.max(0, CONFIG.waitMinutes - elapsed);
                    setCoolTimeRemaining(waitRemaining);
                }

                if (localStorage.getItem(`permLocked_${CONFIG.hwId}`) === 'true') {
                    setPermLocked(true);
                }
            };

            const score = useMemo(() => {
                let correct = 0;
                
                for (let i = 1; i <= 34; i++) {
                    const studentAns = (questionData[i]?.myAnswer || "").toString().trim();
                    const correctAns = (examConfig.common[i] || "").toString().trim();
                    if (studentAns === correctAns) correct++;
                }
                
                for (let i = 35; i <= 45; i++) {
                    const studentAns = (questionData[i]?.myAnswer || "").toString().trim();
                    const correctAns = (examConfig.subjects[selectedSubject][i] || "").toString().trim();
                    if (studentAns === correctAns) correct++;
                }
                
                const total = 45;
                return { correct, total, percent: Math.round((correct / total) * 100) };
            }, [questionData, selectedSubject]);

            const submitAnswers = () => {
                if (permLocked) {
                    alert('🔒 1회차에서 오답이 발생하여 재응시가 불가능합니다.\n해설지도 볼 수 없습니다.');
                    return;
                }

                const history = JSON.parse(localStorage.getItem(`attemptHistory_${CONFIG.hwId}`) || '[]');
                
                if (history.length >= CONFIG.maxAttempts) {
                    alert(`도전 횟수(${CONFIG.maxAttempts}회)를 모두 소진했습니다.`);
                    return;
                }

                if (history.length > 0) {
                    const lastTime = history[history.length - 1].timestamp;
                    const elapsed = Math.floor((Date.now() - lastTime) / 60000);
                    if (elapsed < CONFIG.waitMinutes) {
                        alert(`${CONFIG.waitMinutes - elapsed}분 후에 재응시 가능합니다.`);
                        return;
                    }
                }

                let wrongCount = 0;
                const wrongQuestions = [];

                for (let i = 1; i <= 34; i++) {
                    const studentAns = (questionData[i]?.myAnswer || "").toString().trim();
                    const correctAns = (examConfig.common[i] || "").toString().trim();
                    if (studentAns && studentAns !== correctAns) {
                        wrongCount++;
                        wrongQuestions.push({ num: i, myAnswer: studentAns, correctAnswer: correctAns });
                    }
                }

                for (let i = 35; i <= 45; i++) {
                    const studentAns = (questionData[i]?.myAnswer || "").toString().trim();
                    const correctAns = (examConfig.subjects[selectedSubject][i] || "").toString().trim();
                    if (studentAns && studentAns !== correctAns) {
                        wrongCount++;
                        wrongQuestions.push({ num: i, myAnswer: studentAns, correctAnswer: correctAns });
                    }
                }

                const result = {
                    timestamp: Date.now(),
                    studentName,
                    academyName,
                    subject: selectedSubject,
                    attemptNumber: history.length + 1,
                    score: score.percent,
                    correct: score.correct,
                    wrong: wrongCount,
                    wrongQuestions,
                    userAnswers: questionData,
                    userDifficulty: Object.keys(questionData).reduce((acc, key) => {
                        if (questionData[key].difficulty) acc[key] = questionData[key].difficulty;
                        return acc;
                    }, {})
                };

                // 1회차 오답 시 영구 차단
                const isFirstAttempt = history.length === 0;
                if (isFirstAttempt && wrongCount > 0) {
                    localStorage.setItem(`permLocked_${CONFIG.hwId}`, 'true');
                    setPermLocked(true);
                    // 제출 기록은 저장하되 영구 차단 표시
                    history.push(result);
                    localStorage.setItem(`attemptHistory_${CONFIG.hwId}`, JSON.stringify(history));
                    // GAS 전송
                    submitToGAS(result);
                    updateAttemptInfo();
                    setStep(3);
                    window.scrollTo(0, 0);
                    return;
                }

                history.push(result);
                localStorage.setItem(`attemptHistory_${CONFIG.hwId}`, JSON.stringify(history));
                updateAttemptInfo();

                // GAS 전송
                submitToGAS(result);

                setStep(3);
                window.scrollTo(0, 0);
            };

            const submitToGAS = (result) => {
                const payload = {
                    timestamp: new Date(result.timestamp).toLocaleString('ko-KR'),
                    hwId: CONFIG.hwId,
                    studentName: result.studentName,
                    academyName: result.academyName,
                    subject: result.subject,
                    attemptNumber: result.attemptNumber,
                    score: result.score,
                    correct: result.correct,
                    wrong: result.wrong
                };

                fetch(CONFIG.gasUrl, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                }).catch(e => console.log('GAS 전송 실패 (오프라인 가능):', e));
            };

            const shareToKakao = () => {
                const report = generateKakaoReport();
                
                if (window.Kakao && window.Kakao.Share) {
                    try {
                        window.Kakao.Share.sendDefault({
                            objectType: 'text',
                            text: report,
                            link: { webUrl: window.location.href }
                        });
                        // 카톡 공유 성공 시 해설지 자동 열기
                        setTimeout(() => {
                            window.open('https://goe2427-my.sharepoint.com/:b:/g/personal/pure173_jeonghyeonh_goe_go_kr/IQDtck0RrVtuQb7HBTraR4ujAUSTNbt7fH6Zc0O2SNpG5BQ?e=FJLvjs', '_blank');
                            alert('카톡 공유 완료! 해설지가 새 탭에서 열립니다.');
                        }, 500);
                    } catch (e) {
                        console.error('카카오톡 공유 실패:', e);
                        navigator.clipboard.writeText(report);
                        alert('복사되었습니다! 카카오톡에 붙여넣어주세요.\n\n해설지를 열까요?');
                        window.open('https://goe2427-my.sharepoint.com/:b:/g/personal/pure173_jeonghyeonh_goe_go_kr/IQDtck0RrVtuQb7HBTraR4ujAUSTNbt7fH6Zc0O2SNpG5BQ?e=FJLvjs', '_blank');
                    }
                } else {
                    navigator.clipboard.writeText(report);
                    alert('복사되었습니다! 카카오톡에 붙여넣어주세요.\n\n해설지를 열까요?');
                    window.open('https://goe2427-my.sharepoint.com/:b:/g/personal/pure173_jeonghyeonh_goe_go_kr/IQDtck0RrVtuQb7HBTraR4ujAUSTNbt7fH6Zc0O2SNpG5BQ?e=FJLvjs', '_blank');
                }
            };

            const generateKakaoReport = () => {
                let report = "[셀프분석 제출]\n\n";
                report += "시험명: " + examConfig.examName + "\n";
                report += "이름: " + studentName + "\n";
                report += "학원명: " + academyName + "\n";
                report += "선택과목: " + selectedSubject + "\n\n";
                
                report += "■ 문제별 분류\n";
                for (let i = 1; i <= 45; i++) {
                    const qData = questionData[i] || {};
                    const isCommon = i <= 34;
                    const correctAns = isCommon ? 
                        examConfig.common[i] : 
                        examConfig.subjects[selectedSubject][i];
                    const isCorrect = qData.myAnswer === correctAns;
                    const diff = qData.difficulty === 'O' ? '◯' : qData.difficulty === 'T' ? '△' : qData.difficulty === 'X' ? '✕' : '-';
                    
                    if (qData.myAnswer) {
                        report += `${i}번 [${diff}] 내답:${qData.myAnswer} 정답:${correctAns} (${isCorrect ? 'O' : 'X'})\n`;
                    }
                }
                
                report += "\n■ 분류 통계\n";
                let oCount = 0, tCount = 0, xCount = 0;
                for (let i = 1; i <= 45; i++) {
                    const diff = questionData[i]?.difficulty;
                    if (diff === 'O') oCount++;
                    else if (diff === 'T') tCount++;
                    else if (diff === 'X') xCount++;
                }
                report += `◯ 확실: ${oCount}개\n`;
                report += `△ 애매: ${tCount}개\n`;
                report += `✕ 못함: ${xCount}개\n\n`;
                
                report += "■ 최종 결과\n";
                report += `${score.percent}점 (${score.correct}/${score.total} 정답)\n\n`;
                
                report += "■ 최종 반성\n";
                report += postNotes || "없음";
                
                return report;
            };

            const questionsByRange = {
                common: Array.from({length: 34}, (_, i) => i + 1),
                selective: Array.from({length: 11}, (_, i) => i + 35)
            };

            const canViewSolution = permLocked ? false : (score.correct === 45 || attemptCount <= 0);

            return (
                <div className="min-h-screen pb-20">
                    {step === 1 && (
                        <div className="max-w-4xl mx-auto p-6 space-y-8">
                            <div className="bg-white p-12 rounded-3xl shadow-sm border border-slate-200 text-center">
                                <h1 className="text-4xl font-black mb-2 text-slate-800">5월 1주차 마침내 모의고사</h1>
                                <p className="text-slate-500 font-medium">셀프분석을 통해 자신의 약점을 파악하고 개선 계획을 세워보세요.</p>
                                {permLocked && <p className="text-red-600 font-black mt-4 text-lg">🔒 영구 차단 (1회차 오답) - 재응시 불가능</p>}
                            </div>

                            <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                                <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Icon name="alert-circle" size={24} className="text-indigo-600"/>시험 전 공지사항</h2>
                                <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 h-64 overflow-y-auto font-mono text-sm text-slate-700 whitespace-pre-wrap">{examConfig.announcement}</div>
                            </div>

                            <div className="space-y-6">
                                <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                                    <label className="block text-xs font-black text-slate-400 uppercase mb-4 flex items-center gap-2"><Icon name="user" size={14}/>학생 정보</label>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="이름을 입력하세요" className="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-transparent focus:border-indigo-500 transition-all" value={studentName} onChange={e => setStudentName(e.target.value)} disabled={permLocked}/>
                                        <input type="text" placeholder="학원명을 입력하세요" className="w-full p-4 bg-slate-50 rounded-2xl outline-none border border-transparent focus:border-indigo-500 transition-all" value={academyName} onChange={e => setAcademyName(e.target.value)} disabled={permLocked}/>
                                    </div>
                                </div>

                                <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                                    <label className="block text-xs font-black text-slate-400 uppercase mb-4 flex items-center gap-2"><Icon name="target" size={14}/>시험 전 목표 및 전략</label>
                                    <textarea placeholder="이 시험에서 이루고 싶은 목표와 풀이 전략을 적어보세요. (선택사항)" className="w-full p-4 bg-slate-50 rounded-2xl outline-none h-24 resize-none border border-transparent focus:border-indigo-500 transition-all" value={preNotes} onChange={e => setPreNotes(e.target.value)} disabled={permLocked}></textarea>
                                </div>
                            </div>

                            <div className="bg-blue-50 border-2 border-blue-200 p-6 rounded-2xl">
                                <p className="text-sm font-bold text-blue-900">📊 도전 현황: <span className="text-lg text-indigo-600">{attemptCount}/{CONFIG.maxAttempts}</span></p>
                                {permLocked && <p className="text-sm text-red-600 mt-2">🔒 1회차 오답으로 영구 차단되었습니다.</p>}
                                <button onClick={() => {
                                    if (confirm('모든 응시 기록과 제한을 초기화하시겠습니까?\n(테스트/재시작용)')) {
                                        localStorage.removeItem(`permLocked_${CONFIG.hwId}`);
                                        localStorage.removeItem(`attemptHistory_${CONFIG.hwId}`);
                                        setPermLocked(false);
                                        setAttemptCount(CONFIG.maxAttempts);
                                        alert('초기화 완료! 페이지를 새로고침합니다.');
                                        window.location.reload();
                                    }
                                }} className="mt-3 text-xs bg-red-500 text-white px-3 py-1.5 rounded-lg hover:bg-red-600 transition-all font-bold">
                                    🔄 데이터 초기화
                                </button>
                            </div>

                            <button onClick={() => { if(studentName.trim() && !permLocked) { setStep(2); window.scrollTo(0,0); } else if(permLocked) alert('영구 차단되었습니다.'); else alert('이름을 입력해주세요'); }} className={`w-full py-5 rounded-3xl font-black text-xl shadow-xl transition-all ${permLocked ? 'bg-slate-300 text-slate-500 cursor-not-allowed' : 'bg-indigo-600 text-white active:scale-95'}`}>
                                {permLocked ? '🔒 재응시 불가능' : '정답 입력 시작'}
                            </button>
                        </div>
                    )}

                    {step === 2 && (
                        <div className="max-w-4xl mx-auto p-6 space-y-8">
                            <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                                <h2 className="text-2xl font-bold mb-6 flex items-center gap-2"><Icon name="radio" size={28} className="text-indigo-600"/>선택과목 선택</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    {['화법과작문', '언어와매체'].map(subject => (
                                        <button key={subject} onClick={() => { setSelectedSubject(subject); // 35~45번 초기화
                                            setQuestionData(prev => {
                                                const updated = {...prev};
                                                for (let i = 35; i <= 45; i++) {
                                                    updated[i] = { qNum: i, myAnswer: '', difficulty: '' };
                                                }
                                                return updated;
                                            });
                                        }} className={`p-6 rounded-2xl border-2 transition-all font-bold text-lg ${selectedSubject === subject ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-600 border-slate-200 hover:border-indigo-300'}`}>
                                            {subject}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                                <h2 className="text-2xl font-bold mb-6 flex items-center gap-2"><Icon name="edit-3" size={28} className="text-indigo-600"/>공통과목 정답 입력 (1~34번)</h2>
                                <div className="space-y-6">
                                    {questionsByRange.common.map(qNum => (
                                        <div key={qNum} className="p-6 bg-slate-50 rounded-2xl border border-slate-100/50 flex flex-col gap-4">
                                            <div className="flex items-center justify-between flex-wrap gap-4">
                                                <span className="text-lg font-black text-slate-700 w-20">{qNum}번</span>
                                                <div className="flex gap-2">
                                                    {['O', 'T', 'X'].map(d => (
                                                        <button key={d} onClick={() => updateQuestion(qNum, 'difficulty', d)} className={`px-4 py-2.5 rounded-lg transition-all ${questionData[qNum]?.difficulty === d ? 'bg-indigo-600 text-white scale-110 shadow-md' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}>
                                                            {d === 'O' ? '◯확실' : d === 'T' ? '△애매' : '✕못함'}
                                                        </button>
                                                    ))}
                                                </div>
                                                <div className="flex gap-2 items-center">
                                                    <span className="text-sm font-bold text-slate-400">답:</span>
                                                    <div className="flex gap-2">
                                                        {[1,2,3,4,5].map(ans => (
                                                            <button key={ans} onClick={() => updateQuestion(qNum, 'myAnswer', ans.toString())} className={`answer-circle appearance-none bg-transparent border-0 ${questionData[qNum]?.myAnswer === ans.toString() ? 'selected' : ''}`}>
                                                                {ans}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                                <h2 className="text-2xl font-bold mb-6 flex items-center gap-2"><Icon name="edit-3" size={28} className="text-indigo-600"/>선택과목 정답 입력 (35~45번)</h2>
                                <div className="space-y-6">
                                    {questionsByRange.selective.map(qNum => (
                                        <div key={qNum} className="p-6 bg-slate-50 rounded-2xl border border-slate-100/50 flex flex-col gap-4">
                                            <div className="flex items-center justify-between flex-wrap gap-4">
                                                <span className="text-lg font-black text-slate-700 w-20">{qNum}번</span>
                                                <div className="flex gap-2">
                                                    {['O', 'T', 'X'].map(d => (
                                                        <button key={d} onClick={() => updateQuestion(qNum, 'difficulty', d)} className={`px-4 py-2.5 rounded-lg transition-all ${questionData[qNum]?.difficulty === d ? 'bg-indigo-600 text-white scale-110 shadow-md' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}>
                                                            {d === 'O' ? '◯확실' : d === 'T' ? '△애매' : '✕못함'}
                                                        </button>
                                                    ))}
                                                </div>
                                                <div className="flex gap-2 items-center">
                                                    <span className="text-sm font-bold text-slate-400">답:</span>
                                                    <div className="flex gap-2">
                                                        {[1,2,3,4,5].map(ans => (
                                                            <button key={ans} onClick={() => updateQuestion(qNum, 'myAnswer', ans.toString())} className={`answer-circle appearance-none bg-transparent border-0 ${questionData[qNum]?.myAnswer === ans.toString() ? 'selected' : ''}`}>
                                                                {ans}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="flex gap-4">
                                <button onClick={() => setStep(1)} className="px-10 py-5 bg-white border-2 border-slate-200 rounded-3xl font-black text-slate-500 hover:bg-slate-50 transition-all">이전</button>
                                <button onClick={submitAnswers} className="flex-1 py-5 bg-indigo-600 text-white rounded-3xl font-black text-xl shadow-xl shadow-indigo-100 active:scale-95 transition-all">채점 및 결과 확인</button>
                            </div>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="max-w-4xl mx-auto p-6 space-y-8 pb-24">
                            {permLocked ? (
                                <div className="bg-white p-12 rounded-3xl shadow-sm border border-red-300 text-center">
                                    <div className="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="lock" size={40} strokeWidth={3}/></div>
                                    <h2 className="text-3xl font-black mb-2 text-red-800">⚠️ 영구 차단</h2>
                                    <p className="text-red-600 font-bold mb-4">1회차에서 오답이 발생했으므로 재응시가 불가능하며, 해설지도 볼 수 없습니다.</p>
                                    <div className="bg-red-50 p-6 rounded-2xl text-sm text-red-800 mb-6">
                                        <p className="mb-3"><strong>📌 지침:</strong></p>
                                        <p>• 시험지를 다시 정독하여 놓친 부분을 확인하세요</p>
                                        <p>• 강의 영상을 다시 시청하며 개념을 정리하세요</p>
                                        <p>• 다음 모의고사에 집중하세요</p>
                                    </div>
                                </div>
                            ) : (
                                <>
                                    <div className="bg-white p-12 rounded-3xl shadow-sm border border-slate-200 text-center">
                                        <h2 className="text-slate-400 font-black uppercase tracking-widest text-sm mb-4">Exam Result</h2>
                                        <div className="text-8xl font-black text-indigo-600 mb-4 tabular-nums">{score.percent}<span className="text-3xl text-slate-300 ml-1">/100</span></div>
                                        <p className="text-xl font-bold text-slate-600">총 {score.total}문항 중 <span className="text-indigo-600">{score.correct}문항</span> 정답</p>
                                    </div>

                                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                                        <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Icon name="check-circle" size={24} className="text-indigo-600"/>최종 반성 및 해결 방안</h2>
                                        <p className="text-sm text-slate-500 mb-4 font-medium">채점 결과를 바탕으로 틀린 원인을 분석하고, 다음 시험을 위한 구체적인 계획을 세워보세요.</p>
                                        <textarea placeholder="예: 시간 부족으로 마지막 3문제를 못 풀었는데, 다음엔 더 빠르게 풀어야겠다." className="w-full p-5 bg-slate-50 rounded-2xl outline-none h-32 resize-none border border-transparent focus:border-indigo-500 transition-all" value={postNotes} onChange={e => setPostNotes(e.target.value)}></textarea>
                                    </div>

                                    {attemptCount > 0 && score.correct < 45 && (
                                        <div className="bg-blue-50 border-2 border-blue-300 p-6 rounded-2xl">
                                            <p className="text-sm font-bold text-blue-900">📊 도전 현황: <span className="text-lg text-indigo-600">남은 횟수 {attemptCount}회</span></p>
                                            {coolTimeRemaining > 0 && <p className="text-sm text-blue-700 mt-2">⏱️ 재응시 가능 시간: {coolTimeRemaining}분 후</p>}
                                        </div>
                                    )}

                                    <div className="flex gap-4">
                                        <button onClick={() => setStep(2)} className="px-10 py-5 bg-white border-2 border-slate-200 rounded-3xl font-black text-slate-500 hover:bg-slate-50 transition-all">이전</button>
                                        <button onClick={() => { 
                                            // 3회차 완료: Step 4로 이동
                                            if (attemptCount === 0) {
                                                setStep(4);
                                                window.scrollTo(0, 0);
                                            } 
                                            // 만점: Step 4로 이동
                                            else if (score.correct === 45) {
                                                setStep(4);
                                                window.scrollTo(0, 0);
                                            }
                                            // 쿨타임 충족: 다시 Step 2로
                                            else if (coolTimeRemaining === 0) {
                                                setStep(2);
                                                window.scrollTo(0, 0);
                                            }
                                            // 쿨타임 진행 중
                                            else {
                                                alert(`${coolTimeRemaining}분 후에 재응시 가능합니다.`);
                                            }
                                        }} className={`flex-1 py-5 rounded-3xl font-black text-xl shadow-xl transition-all ${
                                            (attemptCount === 0 || score.correct === 45 || coolTimeRemaining === 0) 
                                            ? 'bg-indigo-600 text-white active:scale-95' 
                                            : 'bg-slate-300 text-slate-500 cursor-not-allowed'
                                        }`}>
                                            {attemptCount === 0 
                                                ? '최종 완료' 
                                                : score.correct === 45 
                                                ? '최종 완료 (만점)' 
                                                : coolTimeRemaining > 0 
                                                ? `${coolTimeRemaining}분 후 재응시` 
                                                : `${attemptCount}회차 응시`
                                            }
                                        </button>
                                    </div>
                                </>
                            )}
                        </div>
                    )}

                    {step === 4 && (
                        <div className="max-w-4xl mx-auto p-6 space-y-6">
                            <div className="bg-white p-10 rounded-3xl shadow-sm border border-slate-200 text-center">
                                <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="check" size={40} strokeWidth={3}/></div>
                                <h2 className="text-3xl font-black mb-2 text-slate-800">분석 완료!</h2>
                                <p className="text-slate-500 mb-10 font-medium">아래 리포트를 복사하여 선생님께 카카오톡으로 제출하세요.</p>
                                <div className="text-left bg-slate-50 p-6 rounded-2xl border border-slate-200 h-96 overflow-y-auto mb-8 font-mono text-sm text-slate-700 whitespace-pre-wrap shadow-inner">{generateKakaoReport()}</div>
                                <button onClick={shareToKakao} className="w-full py-5 btn-kakao rounded-3xl font-black text-xl shadow-xl shadow-yellow-100 active:scale-95 transition-all flex items-center justify-center gap-3">
                                    <Icon name="send" size={24}/>
                                    카카오톡으로 제출 & 해설지 열기
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<StudentApp />);
    </script>
</body>
</html>
