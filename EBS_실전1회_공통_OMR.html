<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>김현석 국어 · EBS 실전 1회 공통 OMR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
      background: #faf6f3;
      padding: 16px;
      max-width: 700px;
      margin: 0 auto;
    }
    .header {
      background: linear-gradient(135deg, #2a5f8f, #1c4368);
      color: white;
      padding: 16px;
      border-radius: 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .notice-card { background: #f5f9fc; border: 1.5px solid #2a5f8f; border-radius: 16px; padding: 12px 14px; margin-bottom: 16px; }
    .notice-title { font-size: 13.5px; font-weight: 800; color: #1c4368; margin-bottom: 8px; }
    .notice-list { list-style: none; padding: 0; margin: 0; }
    .notice-list li { font-size: 12.5px; color: #1a2733; padding: 3px 0 3px 16px; position: relative; line-height: 1.55; }
    .notice-list li::before { content: "•"; color: #2a5f8f; position: absolute; left: 4px; font-weight: 700; }
    .notice-list li b { color: #1c4368; }
    .info-card {
      background: white;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .info-card label { font-weight: 600; color: #1c4368; display: block; margin-bottom: 6px; }
    .info-card input {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #c8d6e0;
      border-radius: 14px;
      font-size: 16px;
      margin-bottom: 12px;
    }
    .section {
      background: white;
      border-radius: 24px;
      padding: 12px;
      margin-bottom: 20px;
    }
    .section-header {
      font-size: 18px;
      font-weight: bold;
      padding: 8px 0;
      border-bottom: 2px solid #e2ecf2;
      margin-bottom: 8px;
      color: #1c4368;
    }
    .question-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #eef3f6;
    }
    .question-num {
      width: 30px;
      font-weight: 700;
      color: #1c4368;
      font-size: 16px;
    }
    .choices {
      display: flex;
      gap: 8px;
      flex: 1;
    }
    .choice {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      border: 1.5px solid #c8d6e0;
      border-radius: 40px;
      background: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .choice.selected {
      background: #2a5f8f;
      border-color: #2a5f8f;
      color: white;
    }
    .choice.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }
    .mark-buttons { display:flex; gap:6px; margin-left:8px; }
    .mark-btn {
      width:30px; height:30px; border-radius:50%;
      border:1.5px solid #c8d6e0; background:white;
      font-size:14px; cursor:pointer; font-weight:bold;
    }
    .mark-btn.active { background:#2a5f8f; color:white; border-color:#2a5f8f; }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 40px;
      font-weight: bold;
      font-size: 16px;
      margin-top: 12px;
      cursor: pointer;
      background: #eee;
      color: #333;
      transition: 0.1s;
    }
    .btn-primary { background: #2a5f8f; color: white; }
    .btn-kakao { background: #fee500; color: #3c1e1e; }
    .btn-warning { background: #ff9f4a; color: #2c1518; }
    .btn-secondary { background: #e7eef3; color: #333; }
    .score-banner {
      background: #f5f9fc;
      border: 2px solid #2a5f8f;
      border-radius: 24px;
      padding: 16px;
      text-align: center;
      margin-bottom: 20px;
      display: none;
    }
    .score-banner.show { display: block; }
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%);
      background: #333; color: white;
      padding: 10px 20px; border-radius: 30px;
      opacity: 0; transition: 0.2s; pointer-events: none;
      z-index: 2000; font-size: 13px;
    }
    .toast.show { opacity: 1; }
    .timer-text { font-size: 13px; font-weight: bold; color: #d04141; margin-top: 8px; }
    .attempt-text { font-size: 12px; color: #1c4368; font-weight: 700; margin-bottom: 5px; }
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 1000;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white; border-radius: 24px;
      width: 100%; max-width: 480px; padding: 20px; text-align: center;
    }
    #report-text {
      width: 100%; height: 200px; margin: 15px 0; padding: 10px;
      font-family: monospace; font-size: 12px;
      background: #f9f9f9; border: 1px solid #ddd; border-radius: 12px;
      user-select: text;
    }
    .link-box { text-align:center; margin-top:12px; }
    .link-btn {
      display:inline-block; padding:10px 18px;
      border:1.5px solid #2a5f8f; border-radius:30px;
      text-decoration:none; color:#2a5f8f; font-weight:700;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="header">
  <h2>EBS 실전 1회 공통</h2>
  <div style="font-size: 12px;">독서 + 문학 (1~34) · 제한 시간 60분</div>
</div>

<div class="notice-card">
  <div class="notice-title">⚠️ 채점 안내</div>
  <ul class="notice-list">
    <li><b>채점은 최대 3회</b>까지 가능합니다.</li>
    <li>채점 사이에는 <b>10분 대기 시간</b>이 있어요. (다시 풀어볼 시간)</li>
    <li>3회를 모두 사용해야 <b>📖 해설지</b>가 열립니다.</li>
    <li>채점 후에는 답안 수정이 불가, 대기가 끝나면 다시 수정·재도전할 수 있어요.</li>
  </ul>
</div>

<div class="score-banner" id="scoreBanner">
  <div class="attempt-text" id="attemptDisplay">📌 남은 채점 횟수: 3회</div>
  <div class="score-main" style="font-size: 32px; font-weight:800;"><span id="scoreCorrect">0</span>/34</div>
  <div class="score-detail" id="scoreText">정답률 0%</div>
  <div id="wrongList" style="color:#d04141; margin-top:6px;"></div>
  <div id="cooldownTimer" class="timer-text hidden"></div>
</div>

<div class="info-card">
  <label>📛 학생 이름</label>
  <input type="text" id="studentName" placeholder="실명 입력">
  <label>🏫 학원명 (또는 전화번호 뒷자리)</label>
  <input type="text" id="studentAcademy" placeholder="예) 대치국어 / 1234">
</div>

<div class="section">
  <div class="section-header">공통 문항 <span id="commonProgress" style="font-size:14px; color:#888;">0/34</span></div>
  <div id="commonList"></div>
</div>

<div style="text-align:center; font-size:11.5px; color:#1c4368; margin-top:4px; font-weight:600;">⚠️ 채점은 최대 3회, 채점 사이 10분 대기</div>
<button id="submitBtn" class="btn btn-primary">✅ 채점하기</button>
<button id="kakaoBtn" class="btn btn-kakao">💬 카톡 공유 (보고서)</button>
<button id="resetBtn" class="btn btn-warning">🔄 ★ 새로 시작하기 (초기화) ★</button>

<div class="link-box">
  <a href="#" class="link-btn" id="problemLink" target="_blank">📄 모의고사 문제지 보기</a>
</div>
<div id="solutionLinkArea" class="link-box hidden">
  <a href="#" class="link-btn" id="solutionLink" target="_blank" style="border-color:#c79a3a; color:#a87a1e;">📖 해설지 보기</a>
</div>

<div class="modal-overlay" id="reportModal">
  <div class="modal">
    <h3>📋 결과 리포트</h3>
    <textarea id="report-text" readonly></textarea>
    <div>
      <button id="copyReportBtn" class="btn btn-primary">📋 클립보드 복사</button>
      <button id="closeModalBtn" class="btn btn-secondary">닫기</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  (function(){
    const $ = sel => document.querySelector(sel);

    // 정답 데이터 (EBS 실전 1회 공통 1~34)
    const ANS = [3,5,4,2,5,4,5,2,4,4,5,4,4,4,3,2,5,3,5,2,3,5,2,5,2,4,5,1,5,5,3,3,5,4];
    const TOTAL = 34;
    const MAX_ATTEMPTS = 3;
    const COOLDOWN_MIN = 10;
    const STORAGE_KEY = 'ebs_jeon1_omr_v1';

    // 문제지 / 해설지 링크 (선생님이 추후 교체)
    const PROBLEM_URL = 'https://goe2427-my.sharepoint.com/:b:/g/personal/pure173_jeonghyeonh_goe_go_kr/IQBizc_JvuBCTJrFV-JrdDiTATx6HqmRzWStol082mwZtYs?e=SIUVfj';
    const SOLUTION_URL = 'https://goe2427-my.sharepoint.com/:b:/g/personal/pure173_jeonghyeonh_goe_go_kr/IQCexKyAmRb8Rq2ose6juvwxASezwVgnkLpLoF28N4fEZIE?e=K3hpfk';

    let state = {
      answers: new Array(TOTAL).fill(0),
      attemptCount: 0,
      cooldownUntil: 0,
      name: '',
      academy: '',
      lastResult: null,
      solutionRevealed: false,
      marks: new Array(TOTAL).fill('')
    };
    let timerInterval = null;

    function buildQuestions() {
      let html = '';
      for(let i=1; i<=TOTAL; i++) {
        html += `<div class="question-row">
          <div class="question-num">${i}</div>
          <div class="choices">
            ${[1,2,3,4,5].map(v => `<button class="choice" data-idx="${i-1}" data-val="${v}">${v}</button>`).join('')}
          </div>
          <div class="mark-buttons">
            <button class="mark-btn" data-mark="o" data-qidx="${i-1}">○</button>
            <button class="mark-btn" data-mark="t" data-qidx="${i-1}">△</button>
            <button class="mark-btn" data-mark="x" data-qidx="${i-1}">✕</button>
          </div>
        </div>`;
      }
      $('#commonList').innerHTML = html;
    }

    function updateUI() {
      const isLocked = state.attemptCount > 0 && state.cooldownUntil > Date.now();
      const permaLocked = state.attemptCount >= MAX_ATTEMPTS;
      const lock = isLocked || permaLocked;
      document.querySelectorAll('.choice').forEach(btn => {
        const idx = parseInt(btn.dataset.idx);
        const val = parseInt(btn.dataset.val);
        if(state.answers[idx] === val) btn.classList.add('selected');
        else btn.classList.remove('selected');
        if(lock) btn.classList.add('disabled');
        else btn.classList.remove('disabled');
      });
      document.querySelectorAll('.mark-btn').forEach(btn => {
        const idx = parseInt(btn.dataset.qidx);
        const mark = btn.dataset.mark;
        if(state.marks[idx] === mark) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      const answered = state.answers.filter(v=>v>0).length;
      $('#commonProgress').innerText = `${answered}/${TOTAL}`;
    }

    function computeScore() {
      let correct = 0, wrongs = [];
      state.answers.forEach((v,i) => {
        if(v===0) wrongs.push(i+1);
        else if(v === ANS[i]) correct++;
        else wrongs.push(i+1);
      });
      return { correct, wrongs, percent: ((correct/TOTAL)*100).toFixed(1) };
    }

    function performGrading() {
      const { correct, wrongs, percent } = computeScore();
      state.lastResult = { correct, wrongs, percent };
      $('#scoreBanner').classList.add('show');
      $('#scoreCorrect').innerText = correct;
      $('#scoreText').innerHTML = `정답률 ${percent}%<br><span style="font-size:11px;">※ 정답은 공개되지 않습니다</span>`;
      if(wrongs.length) $('#wrongList').innerHTML = `❌ 틀린 문항: ${wrongs.join(', ')} (${wrongs.length}개)`;
      else $('#wrongList').innerHTML = '✅ 만점! 축하합니다 🎉';
    }

    function revealSolution() {
      state.solutionRevealed = true;
      $('#solutionLink').href = SOLUTION_URL;
      $('#solutionLinkArea').classList.remove('hidden');
    }

    function updateCooldownUI() {
      const now = Date.now();
      const submitBtn = $('#submitBtn');
      const cooldownDiv = $('#cooldownTimer');
      const remaining = Math.max(0, MAX_ATTEMPTS - state.attemptCount);
      $('#attemptDisplay').innerHTML = `📌 남은 채점 횟수: ${remaining}회`;

      // 3회 소진 → 영구 잠금 + 해설지 노출
      if(state.attemptCount >= MAX_ATTEMPTS) {
        submitBtn.disabled = true;
        submitBtn.innerText = '채점 횟수 소진';
        if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        cooldownDiv.classList.add('hidden');
        revealSolution();
        updateUI();
        return;
      }

      // 대기 중
      if(state.cooldownUntil > now) {
        const remainSec = Math.floor((state.cooldownUntil - now)/1000);
        const minutes = Math.floor(remainSec/60);
        const seconds = remainSec%60;
        cooldownDiv.classList.remove('hidden');
        cooldownDiv.innerHTML = `⏳ 다음 채점까지: ${minutes}분 ${seconds}초`;
        submitBtn.disabled = true;
        if(!timerInterval) {
          timerInterval = setInterval(() => {
            if(Date.now() >= state.cooldownUntil) {
              clearInterval(timerInterval);
              timerInterval = null;
              updateCooldownUI();
            } else updateCooldownUI();
          }, 1000);
        }
        updateUI();
      } else {
        // 대기 끝 → 재도전 가능
        if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        cooldownDiv.classList.add('hidden');
        submitBtn.disabled = false;
        submitBtn.innerText = '✅ 채점하기';
        $('#studentName').disabled = false;
        $('#studentAcademy').disabled = false;
        updateUI();
      }
    }

    function getReportText() {
      const currentName = state.name || $('#studentName').value.trim() || '미입력';
      const currentAcademy = state.academy || $('#studentAcademy').value.trim();
      const attemptNum = state.attemptCount || 1;

      let oList = [], tList = [], xList = [];
      state.marks.forEach((m, idx) => {
        if(m === 'o') oList.push(idx + 1);
        if(m === 't') tList.push(idx + 1);
        if(m === 'x') xList.push(idx + 1);
      });
      const markSection = `📌 [문항 분류 기록]
• ○ (확신): ${oList.join(', ') || '없음'}
• △ (애매): ${tList.join(', ') || '없음'}
• ✕ (모름): ${xList.join(', ') || '없음'}`;

      if(!state.lastResult) {
        return `[EBS 실전 1회 공통 결과]\n━━━━━━━━━━━━━━━━━━━━━━\n👤 이름: ${currentName}${currentAcademy?` (${currentAcademy})`:''}\n⚠️ 아직 채점 전입니다. (답안 작성 중)\n━━━━━━━━━━━━━━━━━━━━━━`;
      }
      const now = new Date();
      const timeStr = `${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
      return `[EBS 실전 1회 공통 결과]
━━━━━━━━━━━━━━━━━━━━━━
👤 이름: ${currentName}${currentAcademy?` (${currentAcademy})`:''}
🔥 채점 회차: ${attemptNum}/${MAX_ATTEMPTS}회차
🎯 총점: ${state.lastResult.correct}/${TOTAL}점
📊 정답률: ${state.lastResult.percent}%
❌ ${state.lastResult.wrongs.length ? `오답: ${state.lastResult.wrongs.join(', ')} (${state.lastResult.wrongs.length}개)` : '만점! 축하합니다 🎉'}
⏱️ 제출시각: ${timeStr}
━━━━━━━━━━━━━━━━━━━━━━
${markSection}
━━━━━━━━━━━━━━━━━━━━━━
※ 정답은 공개되지 않습니다.`;
    }

    function onSubmit() {
      const nameVal = ($('#studentName').value || '').trim() || (state.name || '');
      if(!nameVal) { showToast('이름을 먼저 입력해주세요'); $('#studentName').focus(); return; }
      state.name = nameVal;
      state.academy = ($('#studentAcademy').value || '').trim() || (state.academy || '');
      if(state.attemptCount >= MAX_ATTEMPTS) { alert('채점 횟수를 모두 사용했습니다.'); return; }
      const now = Date.now();
      if(state.cooldownUntil > now) { alert(`다음 채점까지 ${Math.ceil((state.cooldownUntil-now)/60000)}분 기다려주세요.`); return; }
      const answered = state.answers.filter(v=>v>0).length;
      if(answered < TOTAL && !confirm(`미입력 문항이 ${TOTAL-answered}개 있습니다. 그래도 채점할까요?`)) return;
      // 첫 채점 시 한 번 더 안내
      if(state.attemptCount === 0) {
        if(!confirm('채점은 최대 3회, 채점 사이 10분 대기 시간이 있습니다.\n3회를 모두 사용해야 해설지가 열립니다.\n\n채점을 시작할까요?')) return;
      }
      state.attemptCount++;
      performGrading();
      // 3회 미만이면 10분 대기, 3회째면 대기 없이 바로 영구 잠금
      if(state.attemptCount < MAX_ATTEMPTS) {
        state.cooldownUntil = Date.now() + COOLDOWN_MIN*60*1000;
      }
      $('#studentName').disabled = true;
      $('#studentAcademy').disabled = true;
      saveToLocal();
      updateCooldownUI();
      submitToGAS();
      showToast(`채점 완료! (${state.attemptCount}/${MAX_ATTEMPTS}회차)`);
    }

    function submitToGAS() {
      try {
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbw05gNe7MRMnFfo10otZ1BU-IXwKmLQGLTYQznrynRCfYzh7YMw7JYpyQjZUe8IbQFjHw/exec';
        const payload = {
          assignment: 'EBS 실전 1회 공통',
          name: state.name,
          academy: state.academy,
          attempt: state.attemptCount,
          correct: state.lastResult.correct,
          total: TOTAL,
          percent: state.lastResult.percent,
          wrongs: state.lastResult.wrongs.join(','),
          answers: state.answers.join(','),
          time: new Date().toISOString()
        };
        fetch(GAS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(payload) });
      } catch(e) {}
    }

    function resetAll() {
      if(confirm('모든 답안과 채점 기록이 초기화됩니다. 다시 시작하시겠습니까?')) {
        if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        state = {
          answers: new Array(TOTAL).fill(0),
          attemptCount: 0, cooldownUntil: 0,
          name: '', academy: '', lastResult: null,
          solutionRevealed: false,
          marks: new Array(TOTAL).fill('')
        };
        $('#studentName').value = '';
        $('#studentAcademy').value = '';
        $('#studentName').disabled = false;
        $('#studentAcademy').disabled = false;
        $('#scoreBanner').classList.remove('show');
        $('#cooldownTimer').classList.add('hidden');
        $('#solutionLinkArea').classList.add('hidden');
        $('#submitBtn').disabled = false;
        $('#submitBtn').innerText = '✅ 채점하기';
        updateUI();
        saveToLocal();
        showToast('초기화 완료! 답안을 입력하세요.');
      }
    }

    function showReportModal() {
      $('#report-text').value = getReportText();
      $('#reportModal').classList.add('show');
    }
    function copyFullReport() { copyToClipboard(getReportText()); }
    function copyToClipboard(text) {
      try {
        if(navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(() => showToast('복사 완료!')).catch(() => fallbackCopy(text));
        } else fallbackCopy(text);
      } catch(e) { fallbackCopy(text); }
      function fallbackCopy(t) {
        const ta = document.createElement('textarea');
        ta.value = t; ta.setAttribute('readonly',''); ta.style.position='fixed'; ta.style.top='-9999px';
        document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0,99999);
        document.execCommand('copy'); document.body.removeChild(ta); showToast('복사 완료!');
      }
    }
    function closeModal() { $('#reportModal').classList.remove('show'); }
    function showToast(msg) {
      const t = $('#toast'); t.innerText = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    function saveToLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    function loadFromLocal() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      try {
        const d = JSON.parse(raw);
        state.answers = d.answers || new Array(TOTAL).fill(0);
        state.attemptCount = d.attemptCount || 0;
        state.cooldownUntil = d.cooldownUntil || 0;
        // 이미 지난 대기시간은 0으로 정리 (옛 기록 때문에 버튼이 잠기는 것 방지)
        if(state.cooldownUntil && state.cooldownUntil <= Date.now()) state.cooldownUntil = 0;
        state.name = d.name || '';
        state.academy = d.academy || '';
        state.lastResult = d.lastResult || null;
        state.solutionRevealed = !!d.solutionRevealed;
        state.marks = d.marks || new Array(TOTAL).fill('');
        $('#studentName').value = state.name;
        $('#studentAcademy').value = state.academy;
        // 대기 중이거나 3회 소진일 때만 입력칸 잠금 (재도전 가능 상태에선 잠그지 않음)
        const lockInputs = (state.cooldownUntil > Date.now()) || (state.attemptCount >= MAX_ATTEMPTS);
        $('#studentName').disabled = lockInputs;
        $('#studentAcademy').disabled = lockInputs;
        if(state.lastResult) performGrading();
        if(state.solutionRevealed) revealSolution();
      } catch(e) {}
    }

    function onChoiceClick(e) {
      const btn = e.target.closest('.choice');
      if(!btn) return;
      const locked = (state.attemptCount > 0 && state.cooldownUntil > Date.now()) || state.attemptCount >= MAX_ATTEMPTS;
      if(locked) {
        showToast('❌ 지금은 답안 수정이 불가합니다. 대기 후 또는 초기화 후 시도하세요.');
        return;
      }
      const idx = parseInt(btn.dataset.idx);
      const val = parseInt(btn.dataset.val);
      if(state.answers[idx] === val) state.answers[idx] = 0;
      else state.answers[idx] = val;
      updateUI();
      saveToLocal();
    }

    function onMarkClick(e) {
      const btn = e.target.closest('.mark-btn');
      if(!btn) return;
      const idx = parseInt(btn.dataset.qidx);
      const mark = btn.dataset.mark;
      if(state.marks[idx] === mark) state.marks[idx] = '';
      else state.marks[idx] = mark;
      updateUI();
      saveToLocal();
    }

    function bindButtons() {
      $('#submitBtn').onclick = onSubmit;
      $('#resetBtn').onclick = resetAll;
      $('#kakaoBtn').onclick = showReportModal;
      $('#copyReportBtn').onclick = copyFullReport;
      $('#closeModalBtn').onclick = closeModal;
      $('#commonList').addEventListener('click', onChoiceClick);
      $('#commonList').addEventListener('click', onMarkClick);
      $('#problemLink').href = PROBLEM_URL;
    }

    function init() {
      buildQuestions();
      loadFromLocal();
      bindButtons();
      updateUI();
      updateCooldownUI();
    }
    init();
  })();
</script>
</body>
</html>
