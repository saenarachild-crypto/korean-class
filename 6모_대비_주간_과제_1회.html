<script>
(function(){
  const $ = id => document.getElementById(id);
  const asgn = window.__BAKED_ASGN__;
  if(!asgn?.reading?.answers || asgn.reading.answers.length!==40 || !asgn.literature?.answers || asgn.literature.answers.length!==34){
    document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#7c2c3e">⚠️ 오류: 정답 데이터를 불러올 수 없습니다.</div>'; return;
  }

  const STORAGE_KEY = 'kr-omr-may-w2-v3';
  let state = { readingAnswers: new Array(40).fill(0), litAnswers: new Array(34).fill(0), submitted: false, score: null, readingTimes: {}, solutionRevealed: false };
  let gasSubmitted = false;

  const requiredReadings = [
    { idx:0, title:"인공 지능과 인간 지능에 대한 철학적 논의", qRange:"1~6번", day:"Day 1 학습", important:true },
    { idx:1, title:"법실증주의와 법률의 흠결", qRange:"7~12번", day:"Day 2 학습 (매우 중요)", important:true },
    { idx:2, title:"형이상학적 가능성에 대한 판단", qRange:"13~17번", day:"Day 2 학습", important:true },
    { idx:3, title:"착오의 관점에 따른 오상 방위", qRange:"18~21번", day:"Day 3 학습", important:true },
    { idx:4, title:"초유체로의 상전이 임계 조건", qRange:"30~34번", day:"Day 4 학습", important:true },
    { idx:5, title:"상대적 박탈감에 대한 루소와 순자의 견해", qRange:"35~40번", day:"Day 5 학습 (매우 중요)", important:true }
  ];

  function renderReadingTable(){
    const tbody = $('readingTimeTable');
    if(!tbody) return;
    let html = '';
    requiredReadings.forEach((r, i) => {
      let val = state.readingTimes[r.title] || '';
      let importantClass = r.important ? 'important-row' : '';
      html += `<tr class="${importantClass}">
        <td>${i+1}</td>
        <td>${r.title} ${r.important ? '<span class="badge-important">매우 중요</span>' : ''}</td>
        <td>${r.qRange}</td>
        <td><input type="number" class="time-input" data-title="${r.title}" value="${val}" placeholder="분" min="1" max="180"></td>
        <td>${r.day}</td>
      </tr>`;
    });
    tbody.innerHTML = html;
    document.querySelectorAll('.time-input').forEach(inp => {
      inp.addEventListener('change', (e) => {
        let val = e.target.value.trim();
        if(val !== '') {
          let num = parseInt(val,10);
          if(isNaN(num) || num <= 0) {
            showToast('소요 시간은 1분 이상의 숫자여야 합니다.');
            e.target.value = '';
            return;
          }
          if(num > 180) {
            showToast('소요 시간이 너무 깁니다. 다시 확인해주세요.');
            e.target.value = '';
            return;
          }
          state.readingTimes[e.target.dataset.title] = num;
        } else {
          delete state.readingTimes[e.target.dataset.title];
        }
        saveState();
      });
    });
  }

  function validateRequiredTimes(){
    for(let r of requiredReadings){
      let time = state.readingTimes[r.title];
      if(!time) return false;
      let mins = parseInt(time,10);
      if(isNaN(mins) || mins <= 0) return false;
    }
    return true;
  }

  function renderSection(listEl, prefix, count){
    let html = '';
    for(let i=1;i<=count;i++){
      html += `<div class="question-row" data-q="${prefix}" data-num="${i}" id="row-${prefix}-${i}">
        <div class="question-num">${i}<span class="answer-mark right">정답</span><span class="answer-mark wrong">오답</span><span class="answer-mark unanswered">미답</span></div>
        <div class="choices">${[1,2,3,4,5].map(c => `<button type="button" class="choice" data-num="${i}" data-choice="${c}">${c}</button>`).join('')}</div>
      </div>`;
    }
    listEl.innerHTML = html;
  }
  renderSection($('readingList'), 'r', 40);
  renderSection($('literatureList'), 'l', 34);
  renderReadingTable();

  function onChoiceClick(e){
    if(state.submitted) return;
    let btn = e.target.closest('.choice');
    if(!btn) return;
    let row = btn.closest('.question-row');
    let q = row.dataset.q, num = parseInt(row.dataset.num,10), choice = parseInt(btn.dataset.choice);
    let arr = q==='r' ? state.readingAnswers : state.litAnswers;
    arr[num-1] = arr[num-1] === choice ? 0 : choice;
    updateRowUI(q, num);
    updateProgress();
    saveState();
  }
  function updateRowUI(q, num){
    let row = $(`row-${q}-${num}`);
    if(!row) return;
    let arr = q==='r' ? state.readingAnswers : state.litAnswers;
    let selected = arr[num-1] || 0;
    row.querySelectorAll('.choice').forEach(btn => {
      let c = parseInt(btn.dataset.choice);
      if(c===selected) btn.classList.add('selected');
      else btn.classList.remove('selected');
    });
  }
  function updateProgress(){
    let rDone = state.readingAnswers.filter(v=>v>0).length;
    let lDone = state.litAnswers.filter(v=>v>0).length;
    if($('readingProgress')) $('readingProgress').textContent = `${rDone} / 40`;
    if($('litProgress')) $('litProgress').textContent = `${lDone} / 34`;
  }
  function saveState(){
    let data = { v:3, readingAnswers:state.readingAnswers, litAnswers:state.litAnswers, submitted:state.submitted, score:state.score, student:{ name:$('studentName').value, academy:$('studentAcademy').value }, readingTimes:state.readingTimes, solutionRevealed:state.solutionRevealed };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }
  function restoreState(){
    let raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      try{
        let data = JSON.parse(raw);
        if(data.v===3){
          if(data.readingAnswers) state.readingAnswers = data.readingAnswers.map(v=>Number(v)||0);
          if(data.litAnswers) state.litAnswers = data.litAnswers.map(v=>Number(v)||0);
          if(data.student){ $('studentName').value = data.student.name || ''; $('studentAcademy').value = data.student.academy || ''; }
          if(data.readingTimes) state.readingTimes = data.readingTimes;
          if(data.solutionRevealed) state.solutionRevealed = data.solutionRevealed;
          if(data.submitted && data.score){ state.submitted=true; state.score=data.score; applyGradingUI(data.score); $('kakaoBtn').disabled=false; $('submitBtn').disabled=true; $('submitBtn').textContent='채점 완료'; document.body.classList.add('submitted'); }
          if(state.solutionRevealed) $('solutionLinkArea').classList.remove('hidden');
        }
      }catch(e){}
    }
    for(let i=1;i<=40;i++) updateRowUI('r',i);
    for(let i=1;i<=34;i++) updateRowUI('l',i);
    updateProgress();
    renderReadingTable();
  }

  function gradeAll(){
    let rCorrect=0, lCorrect=0, rWrong=[], lWrong=[], rUn=[], lUn=[];
    for(let i=0;i<40;i++){
      let ans=state.readingAnswers[i], key=asgn.reading.answers[i];
      if(ans===0) rUn.push(i+1);
      else if(ans===key) rCorrect++;
      else rWrong.push({num:i+1, mine:ans, correct:key});
    }
    for(let i=0;i<34;i++){
      let ans=state.litAnswers[i], key=asgn.literature.answers[i];
      if(ans===0) lUn.push(i+1);
      else if(ans===key) lCorrect++;
      else lWrong.push({num:i+1, mine:ans, correct:key});
    }
    return { reading:{ correct:rCorrect, total:40, wrong:rWrong, unanswered:rUn }, literature:{ correct:lCorrect, total:34, wrong:lWrong, unanswered:lUn }, totalCorrect:rCorrect+lCorrect, total:74 };
  }

  function applyGradingUI(score){
    for(let i=1;i<=40;i++){
      let row=$(('row-r-'+i)), ans=state.readingAnswers[i-1], key=asgn.reading.answers[i-1];
      if(!row) continue;
      row.classList.remove('correct','wrong','unanswered');
      row.querySelectorAll('.choice.answer').forEach(b=>b.classList.remove('answer'));
      if(ans===0){ row.classList.add('unanswered'); let kb=row.querySelector(`.choice[data-choice="${key}"]`); if(kb) kb.classList.add('answer'); }
      else if(ans===key) row.classList.add('correct');
      else { row.classList.add('wrong'); let kb=row.querySelector(`.choice[data-choice="${key}"]`); if(kb) kb.classList.add('answer'); }
    }
    for(let i=1;i<=34;i++){
      let row=$(('row-l-'+i)), ans=state.litAnswers[i-1], key=asgn.literature.answers[i-1];
      if(!row) continue;
      row.classList.remove('correct','wrong','unanswered');
      row.querySelectorAll('.choice.answer').forEach(b=>b.classList.remove('answer'));
      if(ans===0){ row.classList.add('unanswered'); let kb=row.querySelector(`.choice[data-choice="${key}"]`); if(kb) kb.classList.add('answer'); }
      else if(ans===key) row.classList.add('correct');
      else { row.classList.add('wrong'); let kb=row.querySelector(`.choice[data-choice="${key}"]`); if(kb) kb.classList.add('answer'); }
    }
    document.body.classList.add('submitted');
    $('scoreBanner').classList.add('show');
    $('scoreCorrect').textContent = score.totalCorrect;
    $('readingScore').textContent = score.reading.correct;
    $('litScore').textContent = score.literature.correct;
    let scoreRate = Math.round((score.totalCorrect / 74) * 100);
    $('scoreText').textContent = `정답률 ${scoreRate}%`;
  }

  function showToast(msg){
    let t=$('toast'); t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2400);
  }

  $('submitBtn').onclick = ()=>{
    if(state.submitted) return;
    let name = $('studentName').value.trim();
    if(!name){ showToast('이름을 입력하세요'); $('studentName').focus(); return; }
    if(!validateRequiredTimes()){ showToast('필수 독서 지문의 소요 시간을 모두 입력해야 채점 가능합니다.'); return; }
    let score = gradeAll();
    state.submitted=true; state.score=score;
    applyGradingUI(score);
    $('kakaoBtn').disabled=false;
    $('submitBtn').disabled=true;
    $('submitBtn').textContent='채점 완료';
    saveState();
    submitToGAS();
    $('scoreBanner').scrollIntoView({behavior:'smooth'});
  };

  $('resetBtn').onclick = ()=>{
    if(!confirm('답안, 시간, 채점 결과를 모두 초기화하시겠습니까?\n(이름/학원명은 유지됩니다)')) return;
    state.readingAnswers.fill(0); state.litAnswers.fill(0); state.submitted=false; state.score=null; state.readingTimes={}; state.solutionRevealed=false;
    document.body.classList.remove('submitted');
    $('scoreBanner').classList.remove('show');
    $('kakaoBtn').disabled=true;
    $('submitBtn').disabled=false;
    $('submitBtn').textContent='채점하기';
    $('solutionLinkArea').classList.add('hidden');
    document.querySelectorAll('.choice').forEach(b=>b.classList.remove('selected','answer'));
    document.querySelectorAll('.question-row').forEach(r=>r.classList.remove('correct','wrong','unanswered'));
    updateProgress();
    renderReadingTable();
    saveState();
    window.scrollTo(0,0);
  };

  function generateReport(){
    let s=state.score, name=$('studentName').value.trim()||'이름없음', academy=$('studentAcademy').value.trim();
    let lines=[];
    lines.push('━━━━━━━━━━━━━━━━━━'); lines.push('  김현석 국어 5월 2주차'); lines.push('━━━━━━━━━━━━━━━━━━');
    lines.push(`▣ 학생: ${name} ${academy?`(${academy})`:''}`); lines.push(`▣ 총점: ${s.totalCorrect}/74 (${Math.round(s.totalCorrect/74*100)}%)`);
    lines.push(`  · 독서: ${s.reading.correct}/40`); lines.push(`  · 문학: ${s.literature.correct}/34`); lines.push('');
    if(s.reading.wrong.length){ lines.push(`▣ 독서 오답 (${s.reading.wrong.length})`); s.reading.wrong.forEach(w=>lines.push(`  ${w.num}번  내답:${w.mine} / 정답:${w.correct}`)); lines.push(''); }
    if(s.literature.wrong.length){ lines.push(`▣ 문학 오답 (${s.literature.wrong.length})`); s.literature.wrong.forEach(w=>lines.push(`  ${w.num}번  내답:${w.mine} / 정답:${w.correct}`)); lines.push(''); }
    lines.push('━━━━━━━━━━━━━━━━━━');
    return lines.join('\n');
  }

  let modal=$('kakaoModal');
  $('kakaoBtn').onclick = ()=>{
    if(!state.submitted){ showToast('먼저 채점하세요'); return; }
    $('kakao-report-text').value = generateReport();
    modal.classList.add('show');
    document.body.style.overflow='hidden';
    submitToGAS();
    if(!state.solutionRevealed){
      state.solutionRevealed = true;
      $('solutionLinkArea').classList.remove('hidden');
      saveState();
    }
  };
  function closeModal(){ modal.classList.remove('show'); document.body.style.overflow=''; }
  $('modalCloseBtn').onclick=closeModal;
  $('closeAfterCopyBtn').onclick=closeModal;
  $('copyReportBtn').onclick=()=>{
    let ta=$('kakao-report-text');
    ta.select(); document.execCommand('copy');
    showToast('복사되었습니다');
  };
  modal.onclick=(e)=>{ if(e.target===modal) closeModal(); };

  function submitToGAS(){
    if(gasSubmitted || !state.score) return;
    let payload = { type:'omr-submit', week:asgn.week, student:{ name:$('studentName').value, academy:$('studentAcademy').value }, score:state.score, readingTimes:state.readingTimes };
    fetch(asgn.gasUrl, { method:'POST', mode:'no-cors', body:JSON.stringify(payload), keepalive:true }).catch(e=>console.warn);
    gasSubmitted=true;
  }

  $('studentName').addEventListener('input',saveState);
  $('studentAcademy').addEventListener('input',saveState);
  $('readingList').addEventListener('click', onChoiceClick);
  $('literatureList').addEventListener('click', onChoiceClick);
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      let tid = btn.dataset.tab;
      document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
      $(tid).classList.add('active');
    };
  });

  restoreState();
})();
</script>
</body>
</html>
