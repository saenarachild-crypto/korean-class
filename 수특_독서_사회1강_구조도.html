<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수특 독서 사회 1강 마스터 구조 분석</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // 아이콘 렌더링용 컴포넌트 (DOM 충돌 방지 및 안전한 렌더링)
        const Icon = ({ name, size = 20, className = "" }) => {
            const wrapperRef = useRef(null);
            useEffect(() => {
                if (window.lucide && wrapperRef.current) {
                    wrapperRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons({ root: wrapperRef.current });
                }
            }, [name, size]);
            return <span ref={wrapperRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const App = () => {
            const [activeTopic, setActiveTopic] = useState(0);
            const [activeStep, setActiveStep] = useState(0);

            // 7개 지문의 모든 상세 시각화 데이터 복원
            const topics = useMemo(() => [
                {
                    id: 0, title: "리더십 이론", icon: "users", color: "blue",
                    steps: [
                        { title: "1. 피들러 (상황 적합성)", core: "적합성", type: "grid_cards", data: {
                            left: { title: "리더 스타일", items: [{l: "업무 지향", d: "목표 달성 중시"}, {l: "관계 지향", d: "소통 및 관계 중시"}] },
                            right: { title: "상황 호의성 (3변수)", items: ["리더-구성원 관계", "업무 구조화 정도", "리더의 공식 권한"] },
                            footer: "호의성이 극단적(높음/낮음)일 땐 '업무 지향', 중간일 땐 '관계 지향' 효과적"
                        }},
                        { title: "2. 허시 & 블랜차드", core: "유연성", type: "matrix_4", data: [
                            { n: "지시형", c: "역량↓ 의지↓", a: "높은 과업 / 낮은 관계" },
                            { n: "코치형", c: "역량↓ 의지↑", a: "높은 과업 / 높은 관계" },
                            { n: "지원형", c: "역량↑ 의지↓", a: "낮은 과업 / 높은 관계" },
                            { n: "위임형", c: "역량↑ 의지↑", a: "낮은 과업 / 낮은 관계" }
                        ]},
                        { title: "3. 번스 & 바스", core: "상호 변화", type: "compare_side", data: [
                            { title: "거래적 리더십", list: ["보상/처벌 명확화", "일탈 감시", "안정 지향"] },
                            { title: "변혁적 리더십", list: ["창의성 자극", "동기·가치 변화", "공동 목표 추구"] }
                        ]},
                        { title: "4. 동기 부여 이론", core: "내적 동기", type: "vertical_cards", data: [
                            { h: "로크 (목표 설정)", p: "구체적, 도전적, 공개적 목표 → 성과 상승" },
                            { h: "데시·라이언 (자기 결정)", p: "자율권 부여 시 내적 동기 유발, 물적 보상은 감소" }
                        ]}
                    ]
                },
                {
                    id: 1, title: "정보 비대칭", icon: "trending-up", color: "orange",
                    steps: [
                        { title: "1. 정보 비대칭 개념", core: "정보 격차", type: "text_box", data: "거래 당사자 간 정보의 양과 질이 달라 발생하는 시장의 불완전성 상황" },
                        { title: "2. 역선택의 악순환", core: "시장 실패", type: "step_flow", data: [
                            { s: "평균 보험료 책정", d: "정보 부족으로 평균가 제시" },
                            { s: "저위험군 이탈", d: "우량 고객의 보험 가입 기피" },
                            { s: "고위험군만 잔류", d: "사고 확률 높은 집단 집중" },
                            { s: "보험료 인상", d: "지급액 증가로 비용 상승 및 악순환" }
                        ]},
                        { title: "3. 신호 발송", core: "우위 측 노출", type: "vertical_cards", data: [
                            { h: "대표 사례", p: "학위, 자격증, 제품 보증 기간(Warranty)" },
                            { h: "유효 조건", p: "우수한 특성일수록 신호 발송 비용이 낮아야 유효한 변별력 발생" }
                        ]},
                        { title: "4. 선별 & 평판", core: "효율성 회복", type: "compare_side", data: [
                            { title: "선별 (Screening)", list: ["정보 열위 측이 선택지 제공", "상대가 특성을 스스로 드러내게 유도"] },
                            { title: "평판 구축", list: ["반복 거래 및 리뷰 활용", "신뢰를 통한 비대칭 완화"] }
                        ]}
                    ]
                },
                {
                    id: 2, title: "행정대집행", icon: "gavel", color: "amber",
                    steps: [
                        { title: "1. 개념 및 대상", core: "대체적 작위", type: "compare_side", data: [
                            { title: "집행 가능 (대체적)", list: ["건물 철거", "오염물 제거", "시설물 철거"] },
                            { title: "집행 불가 (비대체적)", list: ["인도 의무", "부작위 의무", "사법상 의무"] }
                        ]},
                        { title: "2. 성립 요건", core: "비례의 원칙", type: "list_points", data: ["공법상 의무 불이행", "대체적 작위 의무", "비례의 원칙 (방치 시 공익 심히 침해)"] },
                        { title: "3. 집행 절차", core: "4단계 과정", type: "step_flow", data: [
                            { s: "계고", d: "상당 기간 내 불이행 시 대집행 예고(문서)" },
                            { s: "영장 통지", d: "시기, 책임자 성명, 비용 구체적 고지" },
                            { s: "대집행 실행", d: "행정청 또는 제3자의 물리력 행사" },
                            { s: "비용 징수", d: "실제 소요된 비용을 의무자에게 납부 명령" }
                        ]},
                        { title: "4. 권리 구제", core: "집행 정지", type: "alert_box", data: "대집행 실행 완료 후에는 원상회복 불가로 소송의 이익이 상실되므로 실행 전 '집행 정지' 신청 필수!" }
                    ]
                },
                {
                    id: 3, title: "거시 경제", icon: "landmark", color: "indigo",
                    steps: [
                        { title: "1. IS-LM 모형", core: "시장 중심", type: "grid_cards", data: {
                            left: { title: "IS (상품 시장)", items: [{l: "기능", d: "이자율↓ → 투자↑ → 소득↑"}, {l: "형태", d: "우하향"}] },
                            right: { title: "LM (화폐 시장)", items: [{l: "기능", d: "소득↑ → 화폐수요↑ → 이자율↑"}, {l: "형태", d: "우상향"}] },
                            footer: "통화량을 중앙은행이 외생적으로 고정한다는 가정을 가짐"
                        }},
                        { title: "2. IS-MP 모형", core: "정책 중심", type: "vertical_cards", data: [
                            { h: "MP 곡선 도입", p: "중앙은행의 기준 금리 직접 조절 함수" },
                            { h: "내생적 주체", p: "중앙은행을 경제 체제 내부에서 유기적으로 작동하는 주체로 설정" }
                        ]},
                        { title: "3. 핵심 차이점", core: "금리 결정 주체", type: "text_box", data: "LM은 시장 수급에 의한 금리 형성을, MP는 중앙은행의 정책 의지에 의한 금리 조정을 강조함" },
                        { title: "4. 기대와 신뢰", core: "정책 파급력", type: "text_box", data: "정책의 신뢰도와 예측 가능성이 경제 주체의 기대를 형성하여 단기 경제 변동의 폭을 결정함" }
                    ]
                },
                {
                    id: 4, title: "착오 송금", icon: "banknote", color: "emerald",
                    steps: [
                        { title: "1. 법적 관계", core: "부당 이득", type: "text_box", data: "민법 741조: 법률상 원인 없이 타인의 재산으로 이익을 얻은 자는 이를 반환할 의무가 있음" },
                        { title: "2. 형사 책임", core: "횡령죄 성립", type: "compare_side", data: [
                            { title: "선의 (몰랐을 때)", list: ["민사상 반환 의무만 존재"] },
                            { title: "악의 (인지 후 소비)", list: ["횡령죄 성립 가능", "불법 영득 의사 인정 (2021 판례)"] }
                        ]},
                        { title: "3. 은행의 역할", core: "중개자 한계", type: "list_points", data: ["수취인 연락 대행", "개인정보 보호법상 정보 제공 불가", "강제 인출/반환 권한 없음"] },
                        { title: "4. 반환 지원 제도", core: "예보 구제", type: "step_flow", data: [
                            { s: "채권 매입", d: "예금보험공사가 송금인 채권 매수" },
                            { s: "자진 반환", d: "수취인에게 연락하여 반환 유도" },
                            { s: "지급 명령", d: "불응 시 법원 명령 통해 강제 회수" }
                        ]}
                    ]
                },
                {
                    id: 5, title: "혼인 제도", icon: "heart", color: "rose",
                    steps: [
                        { title: "1. 성립 요건", core: "실질+형식", type: "grid_cards", data: {
                            left: { title: "실질적 요건", items: ["혼인 의사 합치", "만 18세 도달", "근친혼 금지"] },
                            right: { title: "형식적 요건", items: ["혼인 신고 (수리 완료 시 효력)"] },
                            footer: "가족 형성은 국가 근간이므로 엄격한 법적 절차 준수 필요"
                        }},
                        { title: "2. 무효 vs 취소", core: "소급효 차이", type: "compare_side", data: [
                            { title: "혼인 무효", list: ["의사 흠결, 근친혼", "처음부터 효력 없음", "기록 삭제"] },
                            { title: "혼인 취소", list: ["사기, 강박, 무동의", "판결 후 장래 향해 종료", "기존 관계 인정"] }
                        ]},
                        { title: "3. 이혼 방식", core: "적법 종료", type: "compare_side", data: [
                            { title: "협의 이혼", list: ["부부 합의", "숙려 기간 필수", "법원 최종 확인"] },
                            { title: "재판 이혼", list: ["법정 사유 필요", "조정 전치 주의", "판결 확정"] }
                        ]},
                        { title: "4. 사실혼", core: "실체적 보호", type: "text_box", data: "신고는 없으나 부부 공동생활 실체가 있는 경우 주관적·객관적 요건 하에 일부 법적 보호" }
                    ]
                },
                {
                    id: 6, title: "토지 행정", icon: "map", color: "teal",
                    steps: [
                        { title: "1. 토지 거래 허가제", core: "투기 억제", type: "list_points", data: ["규제 구역 내 거래 시 허가 필수", "무허가 계약은 무효 처리", "투기 억제 및 지가 안정 목적"] },
                        { title: "2. 가격 공시제", core: "지가 지표", type: "compare_side", data: [
                            { title: "표준지 공시지가", list: ["대표 필지 단위 가격"] },
                            { title: "개별 공시지가", list: ["비준표 활용 개별 산정"] }
                        ]},
                        { title: "3. 처분성 및 구제", core: "소송 가능", type: "alert_box", data: "공시지가는 과세/보상의 구속적 기준(사실상 한정액)이 되므로 행정 소송의 대상인 '처분'으로 인정됨" },
                        { title: "4. 법적 정당성", core: "공공복리", type: "text_box", data: "재산권 제한은 공공복리를 위해 필요하며 비례의 원칙 내에서 합헌적임 (헌법 23조/122조)" }
                    ]
                }
            ], []);

            const currentTopic = topics[activeTopic];
            const currentStep = currentTopic.steps[activeStep];

            const handleTopicChange = (idx) => {
                setActiveTopic(idx);
                setActiveStep(0);
            };

            // 상세 렌더러 함수 (안전한 타입 체크 포함)
            const renderDetail = (step, color) => {
                const c = `text-${color}-600`;
                const bg = `bg-${color}-50`;
                const border = `border-${color}-100`;

                const renderItemContent = (it) => {
                    if (typeof it === 'string') return it;
                    if (it && typeof it === 'object' && it.l && it.d) {
                        return <React.Fragment><span className="font-black text-slate-800">{it.l}:</span> {it.d}</React.Fragment>;
                    }
                    return null;
                };

                switch (step.type) {
                    case "grid_cards":
                        return (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className={`p-6 rounded-3xl ${bg} border ${border}`}>
                                        <h4 className="font-black text-slate-800 mb-4">{step.data.left.title}</h4>
                                        <ul className="space-y-2">
                                            {step.data.left.items.map((it, i) => (
                                                <li key={i} className="text-sm font-semibold text-slate-600 flex items-start gap-2">
                                                    <span className={c}>•</span> {renderItemContent(it)}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                    <div className={`p-6 rounded-3xl ${bg} border ${border}`}>
                                        <h4 className="font-black text-slate-800 mb-4">{step.data.right.title}</h4>
                                        <ul className="space-y-2">
                                            {step.data.right.items.map((it, i) => (
                                                <li key={i} className="text-sm font-semibold text-slate-600 flex items-start gap-2">
                                                    <span className={c}>•</span> {renderItemContent(it)}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-900 text-white rounded-2xl text-center text-sm font-bold italic shadow-lg">"{step.data.footer}"</div>
                            </div>
                        );
                    case "matrix_4":
                        return (
                            <div className="grid grid-cols-2 gap-3">
                                {step.data.map((m, i) => (
                                    <div key={i} className={`p-4 border-2 rounded-2xl ${bg} ${border} shadow-sm transition-all hover:scale-105`}>
                                        <div className={`font-black ${c} text-base mb-1`}>{m.n}</div>
                                        <div className="text-[10px] text-slate-400 font-bold mb-2 uppercase tracking-tighter">{m.c}</div>
                                        <div className="text-xs text-slate-700 font-semibold bg-white/60 p-2 rounded-lg">{m.a}</div>
                                    </div>
                                ))}
                            </div>
                        );
                    case "compare_side":
                        return (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {step.data.map((side, i) => (
                                    <div key={i} className={`p-7 rounded-[32px] ${i === 0 ? bg : 'bg-slate-50'} border ${border} shadow-sm`}>
                                        <h4 className="font-black text-slate-800 mb-5 text-lg flex items-center gap-2">
                                            <Icon name={i === 0 ? "check-circle" : "alert-circle"} size={18} className={i === 0 ? c : "text-slate-400"} />
                                            {side.title}
                                        </h4>
                                        <ul className="space-y-3">
                                            {side.list.map((l, j) => (
                                                <li key={j} className="flex items-start gap-3 text-sm font-medium text-slate-600">
                                                    <Icon name="chevron-right" size={16} className={i === 0 ? c : "text-slate-300"} /> {l}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                ))}
                            </div>
                        );
                    case "step_flow":
                        return (
                            <div className="space-y-4 relative">
                                <div className={`absolute left-5 top-4 bottom-4 w-0.5 bg-${color}-100`} />
                                {step.data.map((p, i) => (
                                    <div key={i} className="flex items-start gap-5 relative z-10">
                                        <div className={`w-10 h-10 rounded-full bg-${color}-600 text-white flex items-center justify-center font-black text-xs shrink-0 shadow-md`}>{i+1}</div>
                                        <div className={`flex-1 p-4 rounded-2xl bg-white border ${border} shadow-sm`}>
                                            <div className="font-black text-slate-800 text-sm mb-1">{p.s}</div>
                                            <div className="text-[11px] text-slate-500 font-medium leading-relaxed">{p.d}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        );
                    case "vertical_cards":
                        return (
                            <div className="space-y-4">
                                {step.data.map((card, i) => (
                                    <div key={i} className={`p-6 rounded-[28px] border-2 ${border} ${bg} shadow-sm transition-transform hover:-translate-y-1`}>
                                        <h5 className={`font-black ${c} mb-2 text-base`}>{card.h}</h5>
                                        <p className="text-sm font-semibold text-slate-600 leading-relaxed italic">"{card.p}"</p>
                                    </div>
                                ))}
                            </div>
                        );
                    case "list_points":
                        return (
                            <div className="grid grid-cols-1 gap-3">
                                {step.data.map((txt, i) => (
                                    <div key={i} className="flex items-center gap-4 p-5 bg-white rounded-2xl border border-slate-100 shadow-sm transition-all hover:border-indigo-100">
                                        <Icon name="check-circle-2" size={20} className={c} />
                                        <span className="text-sm font-bold text-slate-700">{txt}</span>
                                    </div>
                                ))}
                            </div>
                        );
                    case "alert_box":
                        return (
                            <div className={`p-10 rounded-[40px] bg-slate-900 border-l-[12px] border-${color}-500 flex flex-col items-center text-center shadow-2xl`}>
                                <Icon name="alert-triangle" size={48} className={`text-${color}-400 mb-5 animate-pulse`} />
                                <p className="text-white text-xl font-black leading-relaxed max-w-lg">
                                    "{step.data}"
                                </p>
                            </div>
                        );
                    case "text_box":
                        return (
                            <div className={`p-14 rounded-[48px] ${bg} border-4 border-dashed ${border} flex items-center justify-center text-center`}>
                                <p className="text-xl md:text-2xl font-bold text-slate-700 leading-relaxed max-w-2xl italic">
                                    "{step.data}"
                                </p>
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="flex flex-col w-full min-h-screen">
                    <header className="bg-white border-b border-slate-200 px-6 py-6 md:px-12 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="p-3.5 bg-indigo-600 text-white rounded-2xl shadow-xl">
                                    <Icon name="layout-dashboard" size={26} />
                                </div>
                                <div>
                                    <div className="flex items-center gap-2 text-indigo-600 font-black text-xs uppercase tracking-widest mb-0.5">EBS 2027 수능특강 독서</div>
                                    <h1 className="text-2xl font-black text-slate-800 tracking-tight">사회 1강 마스터 구조 분석</h1>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto w-full flex flex-col lg:flex-row gap-8 p-6 md:p-10">
                        {/* Sidebar */}
                        <aside className="lg:w-1/4 flex flex-col gap-2.5">
                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-2">지문 선택 (01~33번 문항)</p>
                            {topics.map((topic, idx) => (
                                <button
                                    key={topic.id}
                                    onClick={() => handleTopicChange(idx)}
                                    className={`flex items-center gap-3.5 p-4.5 rounded-2xl transition-all border-2 text-left p-4 ${
                                        activeTopic === idx 
                                        ? `bg-white border-${topic.color}-500 shadow-2xl translate-x-2 ring-1 ring-${topic.color}-200` 
                                        : "bg-transparent border-transparent text-slate-500 hover:bg-white hover:border-slate-200"
                                    }`}
                                >
                                    <div className={`p-2.5 rounded-xl flex items-center justify-center transition-all ${activeTopic === idx ? `bg-${topic.color}-600 text-white shadow-lg` : "bg-slate-200 text-slate-500"}`}>
                                        <Icon name={topic.icon} size={20} />
                                    </div>
                                    <span className={`font-black text-sm tracking-tight ${activeTopic === idx ? "text-slate-900" : ""}`}>{topic.title}</span>
                                    {activeTopic === idx && <Icon name="chevron-right" size={16} className={`ml-auto text-${topic.color}-600`} />}
                                </button>
                            ))}
                        </aside>

                        {/* Main Dashboard */}
                        <main className="flex-1">
                            <div className="bg-white rounded-[56px] shadow-2xl shadow-slate-200/50 border border-slate-100 overflow-hidden flex flex-col min-h-[700px] transition-all duration-500">
                                {/* Topic Hero */}
                                <div className={`p-10 md:p-14 bg-${currentTopic.color}-600 text-white relative overflow-hidden transition-colors duration-500`}>
                                    <div className="absolute top-0 right-0 w-96 h-96 -mr-24 -mt-24 bg-white/10 rounded-full blur-3xl pointer-events-none" />
                                    <div className="relative z-10 flex items-center gap-8">
                                        <div className="p-5 bg-white/20 backdrop-blur-2xl rounded-[32px] shadow-2xl border border-white/30">
                                            <Icon name={currentTopic.icon} size={48} className="text-white" />
                                        </div>
                                        <div>
                                            <h2 className="text-4xl font-black tracking-tighter mb-2">{currentTopic.title}</h2>
                                            <p className="text-white/80 font-medium text-sm md:text-base max-w-lg leading-relaxed">해당 지문의 논리적 전개 과정과 핵심 법리/경제 메커니즘을 상세 시각화 자료와 함께 분석했습니다.</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Step Navigation */}
                                <div className="flex border-b border-slate-100 overflow-x-auto no-scrollbar bg-slate-50/50">
                                    {currentTopic.steps.map((step, idx) => (
                                        <button
                                            key={idx}
                                            onClick={() => setActiveStep(idx)}
                                            className={`flex-1 min-w-[160px] py-7 px-4 text-center transition-all relative ${
                                                activeStep === idx 
                                                ? `text-${currentTopic.color}-600 font-black bg-white shadow-inner` 
                                                : "text-slate-400 font-bold hover:text-slate-600 hover:bg-slate-100/40"
                                            }`}
                                        >
                                            <span className="text-[10px] block mb-1.5 opacity-50 uppercase tracking-widest font-black">Stage 0{idx+1}</span>
                                            <span className="text-xs md:text-sm truncate block tracking-tight">{step.title}</span>
                                            {activeStep === idx && (
                                                <div className={`absolute bottom-0 left-0 right-0 h-2 bg-${currentTopic.color}-600`} />
                                            )}
                                        </button>
                                    ))}
                                </div>

                                {/* Content Display */}
                                <div className="p-10 md:p-16 flex-1 flex flex-col">
                                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-12">
                                        <div>
                                            <h3 className="text-3xl font-black text-slate-800 mb-2 tracking-tight">{currentStep.title}</h3>
                                            <div className="flex items-center gap-2">
                                                <div className={`w-3.5 h-3.5 rounded-full bg-${currentTopic.color}-600 animate-ping`} />
                                                <span className={`text-xs font-black text-${currentTopic.color}-600 uppercase tracking-widest ml-1`}>CORE: {currentStep.core}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex-1">
                                        {renderDetail(currentStep, currentTopic.color)}
                                    </div>

                                    <div className="mt-14 pt-10 border-t border-slate-50 flex items-center justify-between text-slate-300">
                                        <div className="flex gap-3">
                                            {[0,1,2,3].map(dot => (
                                                <div key={dot} className={`h-2.5 rounded-full transition-all duration-700 ${activeStep === dot ? `bg-${currentTopic.color}-600 w-10` : 'bg-slate-100 w-2.5'}`} />
                                            ))}
                                        </div>
                                        <div className="flex items-center gap-1.5 font-black text-[11px] uppercase tracking-tighter italic">
                                            <span>Master structural analysis v2.1</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>

                    <footer className="bg-slate-900 py-14 px-10">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
                            <div className="flex items-center gap-5">
                                <div className="w-16 h-16 rounded-3xl bg-indigo-600 flex items-center justify-center text-white shadow-2xl border border-indigo-400/30">
                                    <Icon name="graduation-cap" size={32} />
                                </div>
                                <div className="text-white text-left">
                                    <p className="font-black text-lg uppercase tracking-tight text-indigo-400 mb-0.5">Comprehensive Dashboard</p>
                                    <p className="text-xs text-slate-400 font-medium leading-relaxed max-w-md">본 대시보드는 7개 지문 각각의 독자적인 4분면 매트릭스, 프로세스 흐름도, 법적 비교 카드를 모두 포함하고 있습니다. 수능 특강 사회 1강의 깊은 논리 구조를 마스터하세요.</p>
                                </div>
                            </div>
                        </div>
                    </footer>

                    {/* Tailwind Safelist Simulation for dynamic colors */}
                    <div className="hidden bg-blue-600 bg-orange-600 bg-amber-600 bg-indigo-600 bg-emerald-600 bg-rose-600 bg-teal-600 border-blue-600 border-orange-600 border-amber-600 border-indigo-600 border-emerald-600 border-rose-600 border-teal-600 text-blue-600 text-orange-600 text-amber-600 text-indigo-600 text-emerald-600 text-rose-600 text-teal-600 bg-blue-50 bg-orange-50 bg-amber-50 bg-indigo-50 bg-emerald-50 bg-rose-50 bg-teal-50 border-blue-100 border-orange-100 border-amber-100 border-indigo-100 border-emerald-100 border-rose-100 border-teal-100 ring-blue-200 ring-orange-200 ring-amber-200 ring-indigo-200 ring-emerald-200 ring-rose-200 ring-teal-200"></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
