<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>수능완성 유형편 OMR (독서·문학 통합)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
      background: #faf6f3;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }
    .header {
      background: linear-gradient(135deg, #2c5e7c, #1f445a);
      color: white;
      padding: 16px;
      border-radius: 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .info-card {
      background: white;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .info-card label { font-weight: 600; color: #2c5e7c; display: block; margin-bottom: 6px; }
    .info-card input {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #c8d8dc;
      border-radius: 14px;
      font-size: 16px;
      margin-bottom: 12px;
    }
    .section {
      background: white;
      border-radius: 24px;
      padding: 12px;
      margin-bottom: 20px;
    }
    .section-header {
      font-size: 18px;
      font-weight: bold;
      padding: 8px 0;
      border-bottom: 2px solid #e2f0f5;
      margin-bottom: 8px;
    }
    .question-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid #eef5f8;
      border-radius: 12px;
      margin-bottom: 2px;
    }
    /* 유형별 배경색 (확실하게 적용되도록 중요도 높임) */
    .type-dokseo1 { background-color: #fef9e6 !important; }
    .type-dokseo2 { background-color: #e8f4f8 !important; }
    .type-dokseo3 { background-color: #e8f8f0 !important; }
    .type-dokseo4 { background-color: #fce4ec !important; }
    .type-munhak1 { background-color: #ede7f6 !important; }
    .type-munhak2 { background-color: #fff3e0 !important; }
    .type-munhak3 { background-color: #e0f2f1 !important; }
    .type-munhak4 { background-color: #fef2f2 !important; }
    .question-label {
      width: 80px;
      font-weight: 700;
      color: #2c5e7c;
      font-size: 13px;
      line-height: 1.3;
      padding-left: 8px;
    }
    .choices {
      display: flex;
      gap: 6px;
      flex: 1;
    }
    .choice {
      flex: 1;
      text-align: center;
      padding: 6px 0;
      border: 1.5px solid #c8d8dc;
      border-radius: 40px;
      background: white;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
    }
    .choice.selected {
      background: #2c5e7c;
      border-color: #2c5e7c;
      color: white;
    }
    .choice.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 40px;
      font-weight: bold;
      font-size: 16px;
      margin-top: 12px;
      cursor: pointer;
    }
    .btn-primary { background: #2c5e7c; color: white; }
    .btn-kakao { background: #fee500; color: #1e3a4a; }
    .btn-warning { background: #ff9f4a; color: #2c1518; }
    .link-box {
      text-align: center;
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .link-btn {
      display: inline-block;
      padding: 8px 16px;
      border: 1.5px solid #2c5e7c;
      border-radius: 30px;
      text-decoration: none;
      color: #2c5e7c;
      background: white;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .link-btn:hover {
      background: #2c5e7c;
      color: white;
    }
    .score-banner {
      background: #fff8f5;
      border: 2px solid #2c5e7c;
      border-radius: 24px;
      padding: 16px;
      text-align: center;
      margin-bottom: 20px;
      display: none;
    }
    .score-banner.show { display: block; }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
      font-size: 13px;
    }
    .toast.show { opacity: 1; }
    .timer-text { font-size: 13px; font-weight: bold; color: #d04141; margin-top: 8px; }
    .attempt-text { font-size: 12px; color: #2c5e7c; font-weight: 700; margin-bottom: 5px; }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white;
      border-radius: 24px;
      width: 100%;
      max-width: 480px;
      padding: 20px;
      text-align: center;
    }
    #report-text {
      width: 100%;
      height: 200px;
      margin: 15px 0;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 12px;
    }
    .hidden { display: none; }
    .mark-buttons {
      display: flex;
      gap: 4px;
      margin-left: 6px;
    }
    .mark-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid #c8d8dc;
      background: white;
      font-size: 12px;
      cursor: pointer;
      font-weight: bold;
    }
    .mark-btn.active {
      background: #2c5e7c;
      color: white;
      border-color: #2c5e7c;
    }
    @media (max-width: 480px) {
      .question-label { width: 70px; font-size: 11px; }
      .choice { font-size: 12px; padding: 5px 0; }
      .mark-btn { width: 24px; height: 24px; font-size: 10px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h2>📋 수능완성 유형편 OMR</h2>
  <div style="font-size: 12px;">독서 유형1~4 + 문학 유형1~4 (총 36문항) · 최대 10회 채점</div>
</div>

<div class="score-banner" id="scoreBanner">
  <div class="attempt-text" id="attemptDisplay">📌 남은 채점 횟수: 10회</div>
  <div class="score-main" style="font-size: 32px; font-weight:800;"><span id="scoreCorrect">0</span>/36</div>
  <div class="score-detail" id="scoreText">정답률 0%</div>
  <div id="wrongList" style="color:#d04141; margin-top:6px;"></div>
  <div id="cooldownTimer" class="timer-text hidden"></div>
</div>

<div class="info-card">
  <label>📛 학생 이름</label>
  <input type="text" id="studentName" placeholder="실명 입력">
</div>

<div class="section">
  <div class="section-header">📖 문항 목록 (유형·번호별) <span id="commonProgress">0/36</span></div>
  <div id="commonList"></div>
</div>

<button id="submitBtn" class="btn btn-primary">✅ 채점하기</button>
<button id="kakaoBtn" class="btn btn-kakao">💬 카톡 공유 (보고서)</button>
<button id="resetBtn" class="btn btn-warning">🔄 ★ 새로 시작하기 (초기화) ★</button>

<div class="link-box">
  <a id="problemLink" href="https://goe2427-my.sharepoint.com/:b:/g/personal/pure173_jeonghyeonh_goe_go_kr/IQC-l46zSzFQT4ceCscUSqFdAXcYB9UrAV4gRJg1hp8ujBU?e=fBFQh6" target="_blank" class="link-btn">📄 문제지 보기</a>
  <a id="solutionLink" href="https://goe2427-my.sharepoint.com/:b:/g/personal/pure173_jeonghyeonh_goe_go_kr/IQAMZKuHHvfuSKb2Vv6xhmMLASyafebKJCBSwXjBMg8TizQ?e=F5UtYo" target="_blank" class="link-btn">📑 해설지 보기</a>
</div>

<div class="modal-overlay" id="reportModal">
  <div class="modal">
    <h3>📋 결과 리포트</h3>
    <textarea id="report-text" readonly></textarea>
    <button id="copyReportBtn" class="btn btn-primary" style="margin-top:10px;">📋 클립보드 복사</button>
    <button id="closeModalBtn" class="btn btn-warning" style="margin-top:10px;">닫기</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  (function(){
    const $ = sel => document.querySelector(sel);
    
    // ============================================================
    // 수능완성 유형편 정답 배열 (1~36번)
    const ANSWERS = [
      5,5,4,2,5,2,  // 독서1 (1~6)
      4,3,3,3,4,2,  // 독서2 (7~12)
      3,3,5,3,3,    // 독서3 (13~17)
      4,1,5,        // 독서4 (18~20)
      2,3,2,4,      // 문학1 (21~24)
      5,1,3,5,      // 문학2 (25~28)
      4,3,5,3,      // 문학3 (29~32)
      3,2,4,5       // 문학4 (33~36)
    ];
    const TOTAL_QS = ANSWERS.length; // 36
    
    // 문항 레이블, 유형 클래스 생성
    const QUESTION_LABELS = [];
    const QUESTION_TYPE_CLASS = [];
    const types = [
      { name: "독서1", count: 6, typeClass: "type-dokseo1" },
      { name: "독서2", count: 6, typeClass: "type-dokseo2" },
      { name: "독서3", count: 5, typeClass: "type-dokseo3" },
      { name: "독서4", count: 3, typeClass: "type-dokseo4" },
      { name: "문학1", count: 4, typeClass: "type-munhak1" },
      { name: "문학2", count: 4, typeClass: "type-munhak2" },
      { name: "문학3", count: 4, typeClass: "type-munhak3" },
      { name: "문학4", count: 4, typeClass: "type-munhak4" }
    ];
    for (let t of types) {
      for (let i = 1; i <= t.count; i++) {
        QUESTION_LABELS.push(`${t.name}-${i}`);
        QUESTION_TYPE_CLASS.push(t.typeClass);
      }
    }
    
    const MAX_ATTEMPTS = 10;
    const COOLDOWN_MIN = 5;
    
    let state = {
      answers: new Array(TOTAL_QS).fill(0),
      attemptCount: 0,
      cooldownUntil: 0,
      name: '',
      lastResult: null,
      marks: new Array(TOTAL_QS).fill('')
    };
    let timerInterval = null;
    
    function buildQuestions() {
      let html = '';
      for(let i=0; i<TOTAL_QS; i++) {
        const label = QUESTION_LABELS[i];
        const typeClass = QUESTION_TYPE_CLASS[i];
        html += `<div class="question-row ${typeClass}">
          <div class="question-label">${label}</div>
          <div class="choices">
            ${[1,2,3,4,5].map(v => `<button class="choice" data-idx="${i}" data-val="${v}">${v}</button>`).join('')}
          </div>
          <div class="mark-buttons">
            <button class="mark-btn" data-mark="o" data-idx="${i}">○</button>
            <button class="mark-btn" data-mark="t" data-idx="${i}">△</button>
            <button class="mark-btn" data-mark="x" data-idx="${i}">✕</button>
          </div>
        </div>`;
      }
      $('#commonList').innerHTML = html;
    }
    
    function updateUI() {
      const isLocked = state.attemptCount > 0;
      document.querySelectorAll('.choice').forEach(btn => {
        const idx = parseInt(btn.dataset.idx);
        const val = parseInt(btn.dataset.val);
        if(state.answers[idx] === val) btn.classList.add('selected');
        else btn.classList.remove('selected');
        if(isLocked) btn.classList.add('disabled');
        else btn.classList.remove('disabled');
      });
      
      document.querySelectorAll('.mark-btn').forEach(btn => {
        const idx = parseInt(btn.dataset.idx);
        const mark = btn.dataset.mark;
        if(state.marks[idx] === mark) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      
      const answered = state.answers.filter(v=>v>0).length;
      $('#commonProgress').innerText = `${answered}/${TOTAL_QS}`;
    }
    
    function computeScore() {
      let correct = 0, wrongs = [];
      state.answers.forEach((v,i) => {
        if(v === 0) wrongs.push(i+1);
        else if(v === ANSWERS[i]) correct++;
        else wrongs.push(i+1);
      });
      return { correct, wrongs, percent: ((correct/TOTAL_QS)*100).toFixed(1) };
    }
    
    function performGrading() {
      const { correct, wrongs, percent } = computeScore();
      state.lastResult = { correct, wrongs, percent };
      $('#scoreBanner').classList.add('show');
      $('#scoreCorrect').innerText = correct;
      $('#scoreText').innerHTML = `정답률 ${percent}%<br><span style="font-size:11px;">※ 정답은 공개되지 않습니다</span>`;
      if(wrongs.length) {
        const wrongLabels = wrongs.map(num => QUESTION_LABELS[num-1]);
        $('#wrongList').innerHTML = `❌ 틀린 문항: ${wrongLabels.join(', ')} (${wrongs.length}개)`;
      } else {
        $('#wrongList').innerHTML = '✅ 만점! 축하합니다';
      }
    }
    
    function updateCooldownUI() {
      const now = Date.now();
      const submitBtn = $('#submitBtn');
      const cooldownDiv = $('#cooldownTimer');
      const remaining = Math.max(0, MAX_ATTEMPTS - state.attemptCount);
      $('#attemptDisplay').innerHTML = `📌 남은 채점 횟수: ${remaining}회`;
      if(state.attemptCount >= MAX_ATTEMPTS) {
        submitBtn.disabled = true;
        submitBtn.innerText = '채점 횟수 소진';
        if(timerInterval) clearInterval(timerInterval);
        cooldownDiv.classList.add('hidden');
        updateUI();
        return;
      }
      if(state.cooldownUntil > now) {
        const remainSec = Math.floor((state.cooldownUntil - now)/1000);
        const minutes = Math.floor(remainSec/60);
        const seconds = remainSec%60;
        cooldownDiv.classList.remove('hidden');
        cooldownDiv.innerHTML = `⏳ 다음 채점까지: ${minutes}분 ${seconds}초`;
        submitBtn.disabled = true;
        if(!timerInterval) {
          timerInterval = setInterval(() => {
            if(Date.now() >= state.cooldownUntil) {
              clearInterval(timerInterval);
              timerInterval = null;
              cooldownDiv.classList.add('hidden');
              if(state.attemptCount < MAX_ATTEMPTS) submitBtn.disabled = false;
              updateCooldownUI();
            } else updateCooldownUI();
          }, 1000);
        }
      } else {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        cooldownDiv.classList.add('hidden');
        submitBtn.disabled = false;
        submitBtn.innerText = '✅ 채점하기';
      }
      updateUI();
    }
    
    function getReportText() {
      const currentName = state.name || '미입력';
      const attemptNum = state.attemptCount || 1;
      
      let oList = [], tList = [], xList = [];
      state.marks.forEach((m, idx) => {
        const label = QUESTION_LABELS[idx];
        if(m === 'o') oList.push(label);
        if(m === 't') tList.push(label);
        if(m === 'x') xList.push(label);
      });
      const markSection = `📌 [문항 분류 기록]
• ○ (확신): ${oList.join(', ') || '없음'}
• △ (애매): ${tList.join(', ') || '없음'}
• ✕ (모름): ${xList.join(', ') || '없음'}`;
      
      if(!state.lastResult) {
        return `[수능완성 유형편 결과]\n━━━━━━━━━━━━━━━━━━━━━━\n👤 이름: ${currentName}\n⚠️ 아직 채점 전입니다.\n━━━━━━━━━━━━━━━━━━━━━━`;
      }
      const wrongLabels = state.lastResult.wrongs.map(num => QUESTION_LABELS[num-1]);
      return `[수능완성 유형편 결과]
━━━━━━━━━━━━━━━━━━━━━━
👤 이름: ${state.name}
🔥 채점 회차: ${attemptNum}회차
🎯 총점: ${state.lastResult.correct}/${TOTAL_QS}점
📊 정답률: ${state.lastResult.percent}%
❌ ${state.lastResult.wrongs.length ? `오답 문항: ${wrongLabels.join(', ')} (${state.lastResult.wrongs.length}개)` : '만점! 축하합니다 🎉'}
━━━━━━━━━━━━━━━━━━━━━━
${markSection}
━━━━━━━━━━━━━━━━━━━━━━
※ 정답은 공개되지 않습니다.`;
    }
    
    function onSubmit() {
      const nameVal = $('#studentName').value.trim();
      if(!nameVal) { alert('이름을 입력하세요'); return; }
      state.name = nameVal;
      if(state.attemptCount >= MAX_ATTEMPTS) { alert('채점 횟수를 모두 사용했습니다. 초기화 후 다시 시도하세요.'); return; }
      const now = Date.now();
      if(state.cooldownUntil > now) { alert(`다음 채점까지 ${Math.ceil((state.cooldownUntil-now)/60000)}분 기다려주세요.`); return; }
      const answered = state.answers.filter(v=>v>0).length;
      if(answered < TOTAL_QS && !confirm(`미입력 문항이 ${TOTAL_QS-answered}개 있습니다. 그래도 채점할까요?`)) return;
      state.attemptCount++;
      performGrading();
      state.cooldownUntil = Date.now() + COOLDOWN_MIN*60*1000;
      $('#studentName').disabled = true;
      saveToLocal();
      updateCooldownUI();
      showToast('채점 완료!');
    }
    
    function resetAll() {
      if(confirm('모든 답안과 채점 기록이 초기화됩니다. 다시 시작하시겠습니까?')) {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        state = {
          answers: new Array(TOTAL_QS).fill(0),
          attemptCount: 0,
          cooldownUntil: 0,
          name: '',
          lastResult: null,
          marks: new Array(TOTAL_QS).fill('')
        };
        $('#studentName').value = '';
        $('#studentName').disabled = false;
        $('#scoreBanner').classList.remove('show');
        $('#cooldownTimer').classList.add('hidden');
        $('#submitBtn').disabled = false;
        $('#submitBtn').innerText = '✅ 채점하기';
        updateUI();
        saveToLocal();
        showToast('초기화 완료! 답안을 입력하세요.');
      }
    }
    
    function showReportModal() {
      $('#report-text').value = getReportText();
      $('#reportModal').classList.add('show');
    }
    
    function copyFullReport() {
      const text = getReportText();
      copyToClipboard(text);
      showToast('리포트가 복사되었습니다!');
    }
    
    function copyToClipboard(text) {
      try {
        if(navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(() => showToast('복사 완료!')).catch(() => fallbackCopy(text));
        } else fallbackCopy(text);
      } catch(e) { fallbackCopy(text); }
      function fallbackCopy(t) {
        const textarea = document.createElement('textarea');
        textarea.value = t;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.top = '-9999px';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast('복사 완료!');
      }
    }
    
    function closeModal() { $('#reportModal').classList.remove('show'); }
    function showToast(msg) {
      const toast = $('#toast');
      toast.innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
    
    function saveToLocal() {
      localStorage.setItem('ebs_type_omr_labels', JSON.stringify({
        answers: state.answers,
        attemptCount: state.attemptCount,
        cooldownUntil: state.cooldownUntil,
        name: state.name,
        lastResult: state.lastResult,
        marks: state.marks
      }));
    }
    
    function loadFromLocal() {
      const raw = localStorage.getItem('ebs_type_omr_labels');
      if(!raw) return;
      try {
        const data = JSON.parse(raw);
        state.answers = data.answers || new Array(TOTAL_QS).fill(0);
        state.attemptCount = data.attemptCount || 0;
        state.cooldownUntil = data.cooldownUntil || 0;
        state.name = data.name || '';
        state.lastResult = data.lastResult || null;
        state.marks = data.marks || new Array(TOTAL_QS).fill('');
        $('#studentName').value = state.name;
        if(state.attemptCount > 0) {
          $('#studentName').disabled = true;
          if(state.lastResult) {
            $('#scoreBanner').classList.add('show');
            $('#scoreCorrect').innerText = state.lastResult.correct;
            $('#scoreText').innerHTML = `정답률 ${state.lastResult.percent}%<br><span style="font-size:11px;">※ 정답은 공개되지 않습니다</span>`;
            if(state.lastResult.wrongs?.length) {
              const wrongLabels = state.lastResult.wrongs.map(num => QUESTION_LABELS[num-1]);
              $('#wrongList').innerHTML = `❌ 틀린 문항: ${wrongLabels.join(', ')}`;
            } else $('#wrongList').innerHTML = '✅ 만점';
          }
        } else {
          $('#studentName').disabled = false;
        }
      } catch(e) {}
    }
    
    function onChoiceClick(e) {
      const btn = e.target.closest('.choice');
      if(!btn) return;
      if(state.attemptCount > 0) {
        showToast('❌ 채점 후에는 답안을 수정할 수 없습니다. "새로 시작하기"를 눌러주세요.');
        return;
      }
      const idx = parseInt(btn.dataset.idx);
      const val = parseInt(btn.dataset.val);
      if(state.answers[idx] === val) state.answers[idx] = 0;
      else state.answers[idx] = val;
      updateUI();
      saveToLocal();
    }
    
    function onMarkClick(e) {
      const btn = e.target.closest('.mark-btn');
      if(!btn) return;
      const idx = parseInt(btn.dataset.idx);
      const mark = btn.dataset.mark;
      if(state.marks[idx] === mark) {
        state.marks[idx] = '';
        btn.classList.remove('active');
      } else {
        state.marks[idx] = mark;
        document.querySelectorAll(`.mark-btn[data-idx="${idx}"]`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
      saveToLocal();
    }
    
    function bindEvents() {
      $('#submitBtn').onclick = onSubmit;
      $('#resetBtn').onclick = resetAll;
      $('#kakaoBtn').onclick = showReportModal;
      $('#copyReportBtn').onclick = copyFullReport;
      $('#closeModalBtn').onclick = closeModal;
      $('#commonList').addEventListener('click', onChoiceClick);
      $('#commonList').addEventListener('click', onMarkClick);
    }
    
    function init() {
      buildQuestions();
      loadFromLocal();
      bindEvents();
      updateUI();
      updateCooldownUI();
    }
    init();
  })();
</script>
</body>
</html>
