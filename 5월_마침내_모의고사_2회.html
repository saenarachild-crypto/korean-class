<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>셀프분석 - 5월 마침내 모의고사 2회차</title>
    <style>
        /* 시스템 폰트 및 기본 스타일 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #F3F4F6; margin: 0; padding: 20px; color: #1F2937; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); overflow: hidden; }
        
        /* 헤더 스타일 */
        .header { background: #4F46E5; color: white; padding: 30px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 800; }
        .header p { margin: 10px 0 0; opacity: 0.9; font-size: 14px; }

        /* 입력 폼 스타일 */
        .content { padding: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 700; color: #6B7280; margin-bottom: 8px; margin-left: 4px; }
        input, select { width: 100%; padding: 14px; border: 1px solid #E5E7EB; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #4F46E5; }

        /* OMR 그리드 스타일 */
        .question-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #F3F4F6; }
        .question-num { font-weight: 800; color: #9CA3AF; width: 30px; }
        .options { display: flex; gap: 8px; }
        .btn-ans { width: 38px; height: 38px; border-radius: 50%; border: 1px solid #E5E7EB; background: white; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .btn-ans.active { background: #4F46E5; color: white; border-color: #4F46E5; }

        /* 버튼 스타일 */
        .btn-main { width: 100%; padding: 18px; background: #4F46E5; color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .btn-main:active { transform: scale(0.98); }
        .btn-copy { background: #FACC15; color: #422006; margin-top: 10px; }
        
        /* 결과 화면 */
        .result-box { text-align: center; padding: 40px 20px; }
        .score { font-size: 64px; font-weight: 900; color: #4F46E5; margin: 0; }
        .wrong-list { background: #FEF2F2; padding: 15px; border-radius: 12px; text-align: left; margin-top: 20px; }
        .wrong-item { display: inline-block; background: white; color: #DC2626; padding: 4px 10px; border-radius: 6px; margin: 3px; font-size: 13px; font-weight: 700; border: 1px solid #FEE2E2; }
        
        .history-item { background: #F9FAFB; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #F3F4F6; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="app-step1">
    <div class="header">
        <h1>5월 마침내 모의고사 2회차</h1>
        <p id="attempt-info">남은 응시 기회: 2회</p>
    </div>
    <div class="content">
        <div class="form-group">
            <label>학생 성함</label>
            <input type="text" id="studentName" placeholder="이름을 입력하세요">
        </div>
        <div class="form-group">
            <label>선택 과목</label>
            <select id="selectedSubject">
                <option value="언어와매체">언어와매체</option>
                <option value="화법과작문">화법과작문</option>
            </select>
        </div>
        <button class="btn-main" onclick="startExam()">응시 시작하기</button>
        <div id="history-section" class="hidden" style="margin-top:30px; border-top:1px solid #eee; pt:20px;">
            <p style="font-size:12px; font-weight:bold; color:#999; margin:20px 0 10px;">저장된 리포트</p>
            <div id="history-list"></div>
        </div>
    </div>
</div>

<div class="container hidden" id="app-step2">
    <div class="header" style="padding: 15px 20px; position: sticky; top:0;">
        <h1 id="exam-title" style="font-size:18px;">마킹 중</h1>
    </div>
    <div id="omr-container" style="background: white;"></div>
    <div style="padding:20px;">
        <button class="btn-main" onclick="submitExam()">제출 및 채점하기</button>
    </div>
</div>

<div class="container hidden" id="app-step3">
    <div class="header">
        <h1 id="result-user">채점 완료</h1>
    </div>
    <div class="content result-box">
        <p style="font-size:14px; font-weight:bold; color:#6B7280; margin-bottom:5px;">나의 점수</p>
        <h2 class="score" id="result-score">0</h2>
        <div class="wrong-list">
            <p style="font-size:12px; font-weight:bold; color:#B91C1C; margin:0 0 10px 4px;">틀린 문항 번호</p>
            <div id="wrong-nums"></div>
        </div>
        <button class="btn-main btn-copy" onclick="copyCurrentReport()">리포트 복사하여 제출하기</button>
        <button class="btn-main" style="background:#F3F4F6; color:#6B7280;" onclick="location.reload()">홈으로 돌아가기</button>
    </div>
</div>

<script>
    const HW_ID = "final_2026_05_02_v5";
    const MAX_ATTEMPTS = 2;[cite: 1]
    
    const examConfig = {
        common: {"1":"2","2":"2","3":"3","4":"1","5":"1","6":"5","7":"3","8":"5","9":"1","10":"2","11":"3","12":"3","13":"4","14":"4","15":"4","16":"4","17":"5","18":"4","19":"1","20":"3","21":"3","22":"4","23":"3","24":"5","25":"1","26":"4","27":"3","28":"5","29":"4","30":"2","31":"3","32":"5","33":"3","34":"2"},[cite: 1]
        subjects: {
            "언어와매체": {"35":"1","36":"4","37":"4","38":"4","39":"3","40":"2","41":"3","42":"5","43":"5","44":"1","45":"5"},[cite: 1]
            "화법과작문": {"35":"5","36":"5","37":"4","38":"5","39":"3","40":"3","41":"5","42":"1","43":"4","44":"4","45":"5"}[cite: 1]
        }
    };

    let userAnswers = {};
    let history = JSON.parse(localStorage.getItem(HW_ID) || "[]");

    function init() {
        document.getElementById('attempt-info').innerText = `남은 응시 기회: ${MAX_ATTEMPTS - history.length}회`;[cite: 1]
        if(history.length > 0) {
            document.getElementById('history-section').classList.remove('hidden');
            const list = document.getElementById('history-list');
            list.innerHTML = history.map((h, i) => `
                <div class="history-item">
                    <span style="font-weight:bold;">${i+1}회차 (${h.score}점)</span>
                    <button onclick="copySpecificReport(${i})" style="padding:6px 12px; border-radius:8px; border:none; background:#E5E7EB; font-weight:bold; cursor:pointer;">복사</button>
                </div>
            `).join('');
        }
    }

    function startExam() {
        const name = document.getElementById('studentName').value;
        if(!name) return alert("이름을 입력해주세요.");
        if(history.length >= MAX_ATTEMPTS) return alert("응시 기회를 모두 사용했습니다.");[cite: 1]

        document.getElementById('app-step1').classList.add('hidden');
        document.getElementById('app-step2').classList.remove('hidden');
        
        const container = document.getElementById('omr-container');
        container.innerHTML = "";
        userAnswers = {};
        
        for(let i=1; i<=45; i++) {
            const row = document.createElement('div');
            row.className = 'question-row';
            row.innerHTML = `
                <span class="question-num">${i}</span>
                <div class="options">
                    ${[1,2,3,4,5].map(a => `<button class="btn-ans" id="q${i}_${a}" onclick="mark(${i}, ${a})">${a}</button>`).join('')}
                </div>
            `;
            container.appendChild(row);
        }
        window.scrollTo(0,0);
    }

    function mark(q, a) {
        for(let i=1; i<=5; i++) document.getElementById(`q${q}_${i}`).classList.remove('active');
        document.getElementById(`q${q}_${a}`).classList.add('active');
        userAnswers[q] = a.toString();
    }

    function submitExam() {
        const subject = document.getElementById('selectedSubject').value;
        let correctCount = 0;
        let wrongs = [];

        for(let i=1; i<=34; i++) {
            if(userAnswers[i] === examConfig.common[i]) correctCount++;
            else wrongs.push(i);
        }
        const subAns = examConfig.subjects[subject];
        for(let i=35; i<=45; i++) {
            if(userAnswers[i] === subAns[i]) correctCount++;
            else wrongs.push(i);
        }

        const score = Math.round((correctCount / 45) * 100);[cite: 1]
        const attempt = {
            num: history.length + 1,
            score: score,
            wrongs: wrongs,
            subject: subject,
            name: document.getElementById('studentName').value
        };

        history.push(attempt);
        localStorage.setItem(HW_ID, JSON.stringify(history));

        document.getElementById('app-step2').classList.add('hidden');
        document.getElementById('app-step3').classList.remove('hidden');
        document.getElementById('result-score').innerText = score;
        document.getElementById('wrong-nums').innerHTML = wrongs.map(n => `<span class="wrong-item">${n}번</span>`).join('');[cite: 1]
        window.scrollTo(0,0);
    }

    function copyCurrentReport() {
        const last = history[history.length - 1];
        const text = `[5월 마침내 모의고사 2회차 제출]\n회차: ${last.num}회차\n이름: ${last.name}\n과목: ${last.subject}\n점수: ${last.score}점\n틀린문항: ${last.wrongs.join(', ') || '없음'}`;[cite: 1]
        copyToClipboard(text);
    }

    function copySpecificReport(index) {
        const h = history[index];
        const text = `[5월 마침내 모의고사 2회차 제출]\n회차: ${h.num}회차\n이름: ${h.name}\n과목: ${h.subject}\n점수: ${h.score}점\n틀린문항: ${h.wrongs.join(', ') || '없음'}`;[cite: 1]
        copyToClipboard(text);
    }

    function copyToClipboard(text) {
        const t = document.createElement("textarea");
        document.body.appendChild(t);
        t.value = text;
        t.select();
        document.execCommand('copy');
        document.body.removeChild(t);
        alert("리포트가 복사되었습니다! 카톡에 붙여넣어주세요.");
    }

    init();
</script>

</body>
</html>
