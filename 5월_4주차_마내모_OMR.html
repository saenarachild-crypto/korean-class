<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>김현석 국어 · 5월 4주차 마침내 모의고사 OMR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
      background: #faf6f3;
      padding: 16px;
      max-width: 700px;
      margin: 0 auto;
    }
    .header {
      background: linear-gradient(135deg, #7c2c3e, #5a1f2c);
      color: white;
      padding: 16px;
      border-radius: 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .info-card {
      background: white;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .info-card label { font-weight: 600; color: #7c2c3e; display: block; margin-bottom: 6px; }
    .info-card input, .info-card select {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #d8c8cc;
      border-radius: 14px;
      font-size: 16px;
      margin-bottom: 12px;
    }
    .tab-menu {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .tab-btn {
      flex: 1;
      background: white;
      border: 1.5px solid #d8c8cc;
      border-radius: 40px;
      padding: 12px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
    }
    .tab-btn.active {
      background: #7c2c3e;
      color: white;
      border: none;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .section {
      background: white;
      border-radius: 24px;
      padding: 12px;
      margin-bottom: 20px;
    }
    .section-header {
      font-size: 18px;
      font-weight: bold;
      padding: 8px 0;
      border-bottom: 2px solid #f0e2e5;
      margin-bottom: 8px;
    }
    .question-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f5ecee;
    }
    .question-num {
      width: 55px;
      font-weight: 700;
      color: #7c2c3e;
      font-size: 16px;
    }
    .choices {
      display: flex;
      gap: 8px;
      flex: 1;
    }
    .choice {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      border: 1.5px solid #d8c8cc;
      border-radius: 40px;
      background: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    .choice.selected {
      background: #7c2c3e;
      border-color: #7c2c3e;
      color: white;
    }
    .choice.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 40px;
      font-weight: bold;
      font-size: 16px;
      margin-top: 12px;
      cursor: pointer;
      background: #eee;
      color: #333;
      transition: 0.1s;
    }
    .btn-primary { background: #7c2c3e; color: white; }
    .btn-kakao { background: #fee500; color: #3c1e1e; }
    .btn-warning { background: #ff9f4a; color: #2c1518; }
    .score-banner {
      background: #fff8f5;
      border: 2px solid #7c2c3e;
      border-radius: 24px;
      padding: 16px;
      text-align: center;
      margin-bottom: 20px;
      display: none;
    }
    .score-banner.show { display: block; }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
      z-index: 2000;
      font-size: 13px;
    }
    .toast.show { opacity: 1; }
    .timer-text { font-size: 13px; font-weight: bold; color: #d04141; margin-top: 8px; }
    .attempt-text { font-size: 12px; color: #7c2c3e; font-weight: 700; margin-bottom: 5px; }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: white;
      border-radius: 24px;
      width: 100%;
      max-width: 480px;
      padding: 20px;
      text-align: center;
    }
    #report-text {
      width: 100%;
      height: 200px;
      margin: 15px 0;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 12px;
    }
    .share-card {
      background: white;
      border-radius: 20px;
      padding: 18px;
      border: 1px solid #efe0e3;
    }
    .report-preview {
      background: #fdf9f7;
      padding: 16px;
      border-radius: 14px;
      font-size: 13px;
      white-space: pre-line;
      line-height: 1.55;
      margin: 12px 0;
      border-left: 4px solid #7c2c3e;
    }
    .hidden { display: none; }

    .mark-buttons {
      display:flex;
      gap:6px;
      margin-left:8px;
    }
    .mark-btn {
      width:30px;
      height:30px;
      border-radius:50%;
      border:1.5px solid #d8c8cc;
      background:white;
      font-size:14px;
      cursor:pointer;
      font-weight:bold;
    }
    .mark-btn.active {
      background:#7c2c3e;
      color:white;
      border-color:#7c2c3e;
    }
    .time-box {
      background:white;
      border-radius:20px;
      padding:14px;
      margin-bottom:18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .time-grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:10px;
    }
    .time-item input {
      width:100%;
      padding:10px;
      border:1.5px solid #d8c8cc;
      border-radius:12px;
      margin-top:4px;
    }

  </style>
</head>
<body>

<div class="header">
  <h2>5월 4주차 마침내 모의고사</h2>
  <div style="font-size: 12px;">공통(1~34) + 선택(35~45) · 최대 10회 채점 · 채점 간 5분 대기</div>
</div>

<div class="score-banner" id="scoreBanner">
  <div class="attempt-text" id="attemptDisplay">📌 남은 채점 횟수: 3회</div>
  <div class="score-main" style="font-size: 32px; font-weight:800;"><span id="scoreCorrect">0</span>/45</div>
  <div class="score-detail" id="scoreText">정답률 0%</div>
  <div id="wrongList" style="color:#d04141; margin-top:6px;"></div>
  <div id="cooldownTimer" class="timer-text hidden"></div>
</div>

<div class="info-card">
  <label>📛 학생 이름</label>
  <input type="text" id="studentName" placeholder="실명 입력">
  <label>📚 선택 과목</label>
  <select id="subjectSelect">
    <option value="화법과작문">화법과작문 (35~45번)</option>
    <option value="언어와매체">언어와매체 (35~45번)</option>
  </select>
</div>


<div class="time-box">
  <div style="font-weight:700; color:#7c2c3e;">⏱️ 지문별 소요 시간 기록</div>
  <div class="time-grid">
    <div class="time-item"><label>독서 1</label><input type="text" placeholder="예: 8분"></div>
    <div class="time-item"><label>독서 2</label><input type="text" placeholder="예: 7분"></div>
    <div class="time-item"><label>독서 3</label><input type="text" placeholder="예: 9분"></div>
    <div class="time-item"><label>독서 4</label><input type="text" placeholder="예: 6분"></div>
    <div class="time-item"><label>문학 1</label><input type="text" placeholder="예: 5분"></div>
    <div class="time-item"><label>문학 2</label><input type="text" placeholder="예: 4분"></div>
    <div class="time-item"><label>문학 3</label><input type="text" placeholder="예: 6분"></div>
    <div class="time-item"><label>문학 4</label><input type="text" placeholder="예: 5분"></div>
    <div class="time-item"><label>선택 과목</label><input type="text" placeholder="예: 11분"></div>
  </div>
</div>

<div class="tab-menu">
  <button class="tab-btn active" data-tab="common-tab">📘 공통 (1~34)</button>
  <button class="tab-btn" data-tab="select-tab">📕 선택 (35~45)</button>
</div>

<div id="common-tab" class="tab-content active">
  <div class="section">
    <div class="section-header">공통 문항 <span id="commonProgress">0/34</span></div>
    <div id="commonList"></div>
  </div>
</div>
<div id="select-tab" class="tab-content">
  <div class="section">
    <div class="section-header">선택 문항 <span id="selectProgress">0/11</span></div>
    <div id="selectList"></div>
  </div>
</div>
<button id="submitBtn" class="btn btn-primary">✅ 채점하기</button>
<button id="kakaoBtn" class="btn btn-kakao">💬 카톡 공유 (보고서)</button>
<button id="resetBtn" class="btn btn-warning">🔄 ★ 새로 시작하기 (초기화) ★</button>

<div class="link-box" style="text-align:center; margin-top:12px;">
  <a href="https://goe2427-my.sharepoint.com/:b:/g/personal/pure173_jeonghyeonh_goe_go_kr/IQB37q2ovk_2SoOthj2wrVMJAWbENtYDDUYW4hMYdTZ2Lhc?e=IxOepa" target="_blank" style="display:inline-block; padding:8px 16px; border:1.5px solid #7c2c3e; border-radius:30px; text-decoration:none; color:#7c2c3e;">📄 모의고사 문제지 보기</a>
</div>
<div class="modal-overlay" id="reportModal">
  <div class="modal">
    <h3>📋 결과 리포트</h3>
    <textarea id="report-text" readonly></textarea>
    <div>
      <button id="copyReportBtn" class="btn btn-primary">📋 클립보드 복사</button>
      <button id="closeModalBtn" class="btn btn-secondary">닫기</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  (function(){
    const $ = sel => document.querySelector(sel);
    
    // 정답 데이터
    const ANS = {
      common: [3,1,5,2,1,3,4,5,2,1,4,2,5,1,4,3,2,3,2,4,2,1,3,4,5,5,4,4,1,2,1,5,3,2],
      "화법과작문": [1,3,4,4,4,2,3,5,5,1,2],
      "언어와매체": [2,1,4,3,3,1,2,4,5,1,5]
    };
    const MAX_ATTEMPTS = 10;
    const COOLDOWN_MIN = 5;
    
    let state = {
      common: new Array(34).fill(0),
      select: new Array(11).fill(0),
      attemptCount: 0,
      cooldownUntil: 0,
      name: '',
      sub: '화법과작문',
      lastResult: null,
      marks: { common: new Array(34).fill(''), select: new Array(11).fill('') }
    };
    let timerInterval = null;
    
    // ----- 버튼 생성 -----
    function buildQuestions() {
      let commonHtml = '', selectHtml = '';
      for(let i=1; i<=34; i++) {
        commonHtml += `<div class="question-row">
          <div class="question-num">${i}</div>
          <div class="choices">
            ${[1,2,3,4,5].map(v => `<button class="choice" data-p="c" data-idx="${i-1}" data-val="${v}">${v}</button>`).join('')}
          </div>
          <div class="mark-buttons">
            <button class="mark-btn" data-mark="o" data-qtype="c" data-qidx="${i-1}">○</button>
            <button class="mark-btn" data-mark="t" data-qtype="c" data-qidx="${i-1}">△</button>
            <button class="mark-btn" data-mark="x" data-qtype="c" data-qidx="${i-1}">✕</button>
          </div>
        </div>`;
      }
      for(let i=1; i<=11; i++) {
        selectHtml += `<div class="question-row">
          <div class="question-num">${i+34}</div>
          <div class="choices">
            ${[1,2,3,4,5].map(v => `<button class="choice" data-p="s" data-idx="${i-1}" data-val="${v}">${v}</button>`).join('')}
          </div>
          <div class="mark-buttons">
            <button class="mark-btn" data-mark="o" data-qtype="s" data-qidx="${i-1}">○</button>
            <button class="mark-btn" data-mark="t" data-qtype="s" data-qidx="${i-1}">△</button>
            <button class="mark-btn" data-mark="x" data-qtype="s" data-qidx="${i-1}">✕</button>
          </div>
        </div>`;
      }
      $('#commonList').innerHTML = commonHtml;
      $('#selectList').innerHTML = selectHtml;
    }
    
    function updateUI() {
      const isLocked = state.attemptCount > 0;
      document.querySelectorAll('.choice').forEach(btn => {
        const p = btn.dataset.p;
        const idx = parseInt(btn.dataset.idx);
        const val = parseInt(btn.dataset.val);
        const current = (p === 'c') ? state.common[idx] : state.select[idx];
        if(current === val) btn.classList.add('selected');
        else btn.classList.remove('selected');
        
        if(isLocked) btn.classList.add('disabled');
        else btn.classList.remove('disabled');
      });

      document.querySelectorAll('.mark-btn').forEach(btn => {
        const type = btn.dataset.qtype;
        const idx = parseInt(btn.dataset.qidx);
        const mark = btn.dataset.mark;

        const current = type === 'c'
          ? state.marks.common[idx]
          : state.marks.select[idx];

        if(current === mark) btn.classList.add('active');
        else btn.classList.remove('active');
      });

      const ansC = state.common.filter(v=>v>0).length;
      const ansS = state.select.filter(v=>v>0).length;
      $('#commonProgress').innerText = `${ansC}/34`;
      $('#selectProgress').innerText = `${ansS}/11`;
    }
    
    function computeScore() {
      let correct = 0, wrongs = [];
      state.common.forEach((v,i) => {
        if(v===0) wrongs.push(i+1);
        else if(v === ANS.common[i]) correct++;
        else wrongs.push(i+1);
      });
      state.select.forEach((v,i) => {
        const currentSub = $('#subjectSelect').value;
        if(v===0) wrongs.push(i+35);
        else if(v === ANS[currentSub][i]) correct++;
        else wrongs.push(i+35);
      });
      return { correct, wrongs, percent: ((correct/45)*100).toFixed(1) };
    }
    
    function performGrading() {
      const { correct, wrongs, percent } = computeScore();
      state.lastResult = { correct, wrongs, percent };
      $('#scoreBanner').classList.add('show');
      $('#scoreCorrect').innerText = correct;
      $('#scoreText').innerHTML = `정답률 ${percent}%<br><span style="font-size:11px;">※ 정답은 공개되지 않습니다</span>`;
      if(wrongs.length) $('#wrongList').innerHTML = `❌ 틀린 문항: ${wrongs.join(', ')} (${wrongs.length}개)`;
      else $('#wrongList').innerHTML = '✅ 만점! 축하합니다';
      updateKakaoPreview();
    }
    
    function updateKakaoPreview() {
      const preview = $('#kakaoPreviewArea');
      if (!preview) return;
      const currentName = $('#studentName').value.trim() || '미입력';
      const currentSub = $('#subjectSelect').value;

      if(!state.lastResult) {
        preview.innerText = `📚 [5월 4주차 마침내 모의고사 결과]
━━━━━━━━━━━━━━━━━━━━━━
👤 이름: ${currentName}
📖 선택과목: ${currentSub}
⚠️ 아직 채점 결과가 없습니다. (답안 작성 중)
━━━━━━━━━━━━━━━━━━━━━━`;
        return;
      }
      const now = new Date();
      const timeStr = `${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
      const wrongMsg = state.lastResult.wrongs.length ? `❌ 오답 문항: ${state.lastResult.wrongs.join(', ')} (${state.lastResult.wrongs.length}개)` : '✅ 만점! 축하합니다 🎉';
      preview.innerText = `📚 [5월 4주차 마침내 모의고사 결과]
👤 이름: ${state.name}
📖 선택과목: ${state.sub}
🎯 총점: ${state.lastResult.correct}/45점
📊 정답률: ${state.lastResult.percent}%
${wrongMsg}
⏱️ 제출시각: ${timeStr}
※ 정답은 공개되지 않습니다.`;
    }
    
    function updateCooldownUI() {
      const now = Date.now();
      const submitBtn = $('#submitBtn');
      const cooldownDiv = $('#cooldownTimer');
      const remaining = Math.max(0, MAX_ATTEMPTS - state.attemptCount);
      $('#attemptDisplay').innerHTML = `📌 남은 채점 횟수: ${remaining}회`;
      if(state.attemptCount >= MAX_ATTEMPTS) {
        submitBtn.disabled = true;
        submitBtn.innerText = '채점 횟수 소진';
        if(timerInterval) clearInterval(timerInterval);
        cooldownDiv.classList.add('hidden');
        updateUI();
        return;
      }
      if(state.cooldownUntil > now) {
        const remainSec = Math.floor((state.cooldownUntil - now)/1000);
        const minutes = Math.floor(remainSec/60);
        const seconds = remainSec%60;
        cooldownDiv.classList.remove('hidden');
        cooldownDiv.innerHTML = `⏳ 다음 채점까지: ${minutes}분 ${seconds}초`;
        submitBtn.disabled = true;
        if(!timerInterval) {
          timerInterval = setInterval(() => {
            if(Date.now() >= state.cooldownUntil) {
              clearInterval(timerInterval);
              timerInterval = null;
              cooldownDiv.classList.add('hidden');
              if(state.attemptCount < MAX_ATTEMPTS) submitBtn.disabled = false;
              updateCooldownUI();
            } else updateCooldownUI();
          }, 1000);
        }
      } else {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        cooldownDiv.classList.add('hidden');
        submitBtn.disabled = false;
        submitBtn.innerText = '✅ 채점하기';
      }
      updateUI();
    }
    
    function getReportText() {
      const currentName = $('#studentName').value.trim() || '미입력';
      const currentSub = $('#subjectSelect').value;
      if(!state.lastResult) return `[5월 4주차 모의고사 결과]\n━━━━━━━━━━━━━━━━━━━━━━\n👤 이름: ${currentName}\n📚 선택과목: ${currentSub}\n⚠️ 아직 채점 전입니다. (답안 작성 중)\n━━━━━━━━━━━━━━━━━━━━━━`;
      return `[5월 4주차 마침내 모의고사 결과]
━━━━━━━━━━━━━━━━━━━━━━
👤 이름: ${state.name}
📚 선택과목: ${state.sub}
🎯 총점: ${state.lastResult.correct}/45점
📊 정답률: ${state.lastResult.percent}%
❌ ${state.lastResult.wrongs.length ? `오답: ${state.lastResult.wrongs.join(', ')} (${state.lastResult.wrongs.length}개)` : '만점! 축하합니다 🎉'}
━━━━━━━━━━━━━━━━━━━━━━
※ 정답은 공개되지 않습니다.`;
    }
    
    function onSubmit() {
      const nameVal = $('#studentName').value.trim();
      if(!nameVal) { alert('이름을 입력하세요'); return; }
      state.name = nameVal;
      state.sub = $('#subjectSelect').value;
      if(state.attemptCount >= MAX_ATTEMPTS) { alert('채점 횟수를 모두 사용했습니다. 초기화 후 다시 시도하세요.'); return; }
      const now = Date.now();
      if(state.cooldownUntil > now) { alert(`다음 채점까지 ${Math.ceil((state.cooldownUntil-now)/60000)}분 기다려주세요.`); return; }
      const answered = state.common.filter(v=>v>0).length + state.select.filter(v=>v>0).length;
      if(answered < 45 && !confirm(`미입력 문항이 ${45-answered}개 있습니다. 그래도 채점할까요?`)) return;
      performGrading();
      state.attemptCount++;
      state.cooldownUntil = Date.now() + COOLDOWN_MIN*60*1000;
      $('#studentName').disabled = true;
      $('#subjectSelect').disabled = true;
      saveToLocal();
      updateCooldownUI();
      showToast('채점 완료!');
    }
    
    function resetAll() {
      if(confirm('모든 답안과 채점 기록이 초기화됩니다. 다시 시작하시겠습니까?')) {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        state = {
          common: new Array(34).fill(0),
          select: new Array(11).fill(0),
          attemptCount: 0,
          cooldownUntil: 0,
          name: '',
          sub: '화법과작문',
          lastResult: null,
          marks: { common: new Array(34).fill(''), select: new Array(11).fill('') },
      marks: { common: new Array(34).fill(''), select: new Array(11).fill('') }
        };
        $('#studentName').value = '';
        $('#subjectSelect').value = '화법과작문';
        $('#studentName').disabled = false;
        $('#subjectSelect').disabled = false;
        $('#scoreBanner').classList.remove('show');
        $('#cooldownTimer').classList.add('hidden');
        $('#submitBtn').disabled = false;
        $('#submitBtn').innerText = '✅ 채점하기';
        updateKakaoPreview();
        updateUI();
        saveToLocal();
        showToast('초기화 완료! 답안을 입력하세요.');
      }
    }
    
    function showReportModal() {
      $('#report-text').value = getReportText();
      $('#reportModal').classList.add('show');
    }
    
    function copyFullReport() {
      const text = getReportText();
      copyToClipboard(text);
      showToast('리포트가 복사되었습니다!');
    }
    
    function copyKakaoMessage() {
      const msg = getReportText();
      copyToClipboard(msg);
      showToast('✅ 카톡 메시지가 복사되었습니다! 카톡에 붙여넣기 하세요.');
    }
    
    function copyToClipboard(text) {
      try {
        if(navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(() => showToast('복사 완료!')).catch(() => fallbackCopy(text));
        } else fallbackCopy(text);
      } catch(e) { fallbackCopy(text); }
      function fallbackCopy(t) {
        const textarea = document.createElement('textarea');
        textarea.value = t;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.top = '-9999px';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        textarea.setSelectionRange(0, 99999);
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast('복사 완료!');
      }
    }
    
    function closeModal() { $('#reportModal').classList.remove('show'); }
    function showToast(msg) {
      const toast = $('#toast');
      toast.innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
    
    function saveToLocal() {
      localStorage.setItem('may_omr_v2', JSON.stringify({
        common: state.common, select: state.select, attemptCount: state.attemptCount,
        cooldownUntil: state.cooldownUntil, name: state.name, sub: state.sub, lastResult: state.lastResult, marks: state.marks
      }));
    }
    function loadFromLocal() {
      const raw = localStorage.getItem('may_omr_v2');
      if(!raw) return;
      try {
        const data = JSON.parse(raw);
        state.common = data.common || new Array(34).fill(0);
        state.select = data.select || new Array(11).fill(0);
        state.attemptCount = data.attemptCount || 0;
        state.cooldownUntil = data.cooldownUntil || 0;
        state.name = data.name || '';
        state.sub = data.sub || '화법과작문';
        state.lastResult = data.lastResult || null;
        state.marks = data.marks || { common: new Array(34).fill(''), select: new Array(11).fill('') };
        $('#studentName').value = state.name;
        $('#subjectSelect').value = state.sub;
        if(state.attemptCount > 0) {
          $('#studentName').disabled = true;
          $('#subjectSelect').disabled = true;
          if(state.lastResult) {
            $('#scoreBanner').classList.add('show');
            $('#scoreCorrect').innerText = state.lastResult.correct;
            $('#scoreText').innerHTML = `정답률 ${state.lastResult.percent}%`;
            if(state.lastResult.wrongs?.length) $('#wrongList').innerHTML = `❌ 틀린 문항: ${state.lastResult.wrongs.join(', ')}`;
            else $('#wrongList').innerHTML = '✅ 만점';
                }
        } else {
          $('#studentName').disabled = false;
          $('#subjectSelect').disabled = false;
        }
      } catch(e) {}
    }
    
    function onChoiceClick(e) {
      const btn = e.target.closest('.choice');
      if(!btn) return;
      
      if(state.attemptCount > 0) {
        showToast('❌ 채점 후에는 답안을 수정할 수 없습니다. "새로 시작하기"를 눌러주세요.');
        return;
      }
      const p = btn.dataset.p;
      const idx = parseInt(btn.dataset.idx);
      const val = parseInt(btn.dataset.val);
      const arr = p === 'c' ? state.common : state.select;
      if(arr[idx] === val) arr[idx] = 0;
      else arr[idx] = val;
      updateUI();
      saveToLocal();
    }
    

    function onMarkClick(e) {
      const btn = e.target.closest('.mark-btn');
      if(!btn) return;

      const type = btn.dataset.qtype;
      const idx = parseInt(btn.dataset.qidx);
      const mark = btn.dataset.mark;

      const targetArr = type === 'c' ? state.marks.common : state.marks.select;

      if(targetArr[idx] === mark) {
        targetArr[idx] = '';
        btn.classList.remove('active');
      } else {
        targetArr[idx] = mark;

        document.querySelectorAll(`.mark-btn[data-qtype="${type}"][data-qidx="${idx}"]`).forEach(b=>{
          b.classList.remove('active');
        });

        btn.classList.add('active');
      }

      saveToLocal();
    }


    function initTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
          btn.classList.add('active');
          const targetId = btn.getAttribute('data-tab');
          if(targetId) $(targetId).classList.add('active');
          
          if(targetId === 'kakao-tab') {
            updateKakaoPreview();
          }
        });
      });
    }
    
    function bindButtons() {
      $('#submitBtn').onclick = onSubmit;
      $('#resetBtn').onclick = resetAll;
      $('#kakaoBtn').onclick = showReportModal;
      $('#copyReportBtn').onclick = copyFullReport;
      $('#closeModalBtn').onclick = closeModal;
      
      $('#commonList').addEventListener('click', onChoiceClick);
      $('#selectList').addEventListener('click', onChoiceClick);
      $('#commonList').addEventListener('click', onMarkClick);
      $('#selectList').addEventListener('click', onMarkClick);
    }
    
    function init() {
      buildQuestions();
      loadFromLocal();
      bindButtons();
      initTabs();
      updateUI();
      updateCooldownUI();
      updateKakaoPreview();
    }
    init();
  })();
</script>
</body>
</html>
